function HomeworkCard({hw,currentUser,db,setDb,addNotif,L}){
  const [expanded,setExpanded]=useState(false);
  const [studentNote,setStudentNote]=useState(hw.studentNote||"");
  const [teacherFb,setTeacherFb]=useState(hw.teacherFeedback||"");
  const [recording,setRecording]=useState(false);
  const isTeacher=currentUser.role==="teacher";
  const isStudent=currentUser.role==="student";
  const student=db.users.find(u=>u.id===hw.studentId);
  const teacher=db.users.find(u=>u.id===hw.teacherId);

  const statusColors={pending:T.gold,submitted:T.blueL,reviewed:T.greenL,overdue:T.redL};
  const statusLabels={
    pending:  L==="ar"?"⏳ معلق":"⏳ Pending",
    submitted:L==="ar"?"📨 مُسلَّم":"📨 Submitted",
    reviewed: L==="ar"?"✅ تمت المراجعة":"✅ Reviewed",
    overdue:  L==="ar"?"⚠️ متأخر":"⚠️ Overdue",
  };

  const submitHW=()=>{
    setDb(p=>({...p,homeworks:p.homeworks.map(h=>h.id===hw.id?{...h,studentNote,status:"submitted",submittedAt:Date.now()}:h)}));
    addNotif({to:hw.teacherId,type:"info",title:L==="ar"?"📨 واجب جديد":"📨 New Homework Submission",body:`${getName(student,L)} ${L==="ar"?"سلّم الواجب:":"submitted homework:"} ${L==="ar"?hw.title:hw.titleEn}`});
  };

  const reviewHW=()=>{
    setDb(p=>({...p,homeworks:p.homeworks.map(h=>h.id===hw.id?{...h,teacherFeedback:teacherFb,status:"reviewed",reviewedAt:Date.now()}:h)}));
    addNotif({to:hw.studentId,type:"success",title:L==="ar"?"✅ تم تصحيح واجبك":"✅ Homework Reviewed",body:`${L==="ar"?hw.title:hw.titleEn}: ${teacherFb.slice(0,50)}`});
  };

  return(
    <div style={{background:T.card,border:`1px solid ${statusColors[hw.status]||T.border}22`,borderRadius:14,overflow:"hidden",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",cursor:"pointer"}} onClick={()=>setExpanded(p=>!p)}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <span style={{fontSize:22}}>📋</span>
          <div>
            <div style={{color:T.text,fontWeight:800,fontSize:14}}>{L==="ar"?hw.title:hw.titleEn}</div>
            <div style={{color:T.muted,fontSize:12,marginTop:2}}>
              {isTeacher?`${L==="ar"?"للطالب:":"Student:"} ${getName(student,L)}`:`${L==="ar"?"من المعلم:":"From:"} ${getName(teacher,L)}`}
              {" · "}{L==="ar"?"الاستحقاق:":"Due:"} {hw.dueDate}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{color:statusColors[hw.status]||T.gold,fontSize:12,fontWeight:700}}>{statusLabels[hw.status]||hw.status}</span>
          <span style={{color:T.muted,fontSize:14}}>{expanded?"▲":"▼"}</span>
        </div>
      </div>

      {expanded&&(
        <div style={{padding:"0 16px 16px",borderTop:`1px solid ${T.border}`}}>
          <div style={{background:T.bg,borderRadius:10,padding:12,margin:"12px 0"}}>
            <div style={{color:T.muted,fontSize:11,marginBottom:4}}>{L==="ar"?"تفاصيل الواجب:":"Assignment details:"}</div>
            <div style={{color:T.textD,fontSize:13,lineHeight:1.7}}>{L==="ar"?hw.desc:hw.descEn}</div>
          </div>

          {/* Student submission area */}
          {isStudent&&hw.status==="pending"&&(
            <div>
              <label style={{display:"block",color:T.textD,fontSize:13,marginBottom:6,fontWeight:600}}>
                {L==="ar"?"ملاحظتك / إجابتك:":"Your note / answer:"}
              </label>
              <textarea value={studentNote} onChange={e=>setStudentNote(e.target.value)} rows={3} placeholder={L==="ar"?"اكتب ملاحظتك هنا...":"Write your note here..."} className="inp"
                style={{width:"100%",background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",color:T.text,fontSize:14,fontFamily:"inherit",resize:"vertical"}}/>
              <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
                <GBtn sm onClick={submitHW}>📨 {L==="ar"?"تسليم الواجب":"Submit Homework"}</GBtn>
                <GBtn ghost sm onClick={()=>{
                  setRecording(p=>!p);
                  if(!recording) addNotif({to:currentUser.id,type:"info",title:L==="ar"?"🎙 تسجيل صوتي":"🎙 Voice Recording",body:L==="ar"?"محاكاة: سيُفعَّل التسجيل الصوتي الحقيقي بعد النشر":"Demo: Real recording activates after deployment"});
                }}>
                  {recording?(L==="ar"?"⏹ إيقاف":"⏹ Stop"):"🎙 "+(L==="ar"?"تسجيل صوتي":"Voice Recording")}
                </GBtn>
              </div>
              {recording&&<div style={{background:"#0a1f0a",border:`1px solid ${T.greenL}44`,borderRadius:10,padding:12,marginTop:8,display:"flex",alignItems:"center",gap:10}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:T.redL,animation:"pulse 1s ease infinite",display:"inline-block"}}/>
                <span style={{color:T.greenL,fontSize:13}}>{L==="ar"?"جارٍ التسجيل... (تجريبي)":"Recording... (demo mode)"}</span>
              </div>}
            </div>
          )}

          {/* Show student submission */}
          {hw.studentNote&&(
            <div style={{background:`${T.blue}10`,border:`1px solid ${T.blue}33`,borderRadius:10,padding:12,marginTop:10}}>
              <div style={{color:T.blueL,fontSize:12,fontWeight:700,marginBottom:4}}>📨 {L==="ar"?"إجابة الطالب:":"Student's Answer:"}</div>
              <div style={{color:T.text,fontSize:13}}>{hw.studentNote}</div>
              {hw.submittedAt&&<div style={{color:T.muted,fontSize:11,marginTop:4}}>{new Date(hw.submittedAt).toLocaleDateString(L==="ar"?"ar-SA":"en-US")}</div>}
            </div>
          )}

          {/* Teacher feedback area */}
          {isTeacher&&hw.status==="submitted"&&(
            <div style={{marginTop:12}}>
              <label style={{display:"block",color:T.textD,fontSize:13,marginBottom:6,fontWeight:600}}>
                {L==="ar"?"تعليقك وتصحيحك:":"Your feedback:"}
              </label>
              <textarea value={teacherFb} onChange={e=>setTeacherFb(e.target.value)} rows={3} placeholder={L==="ar"?"اكتب تعليقك...":"Write your feedback..."} className="inp"
                style={{width:"100%",background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",color:T.text,fontSize:14,fontFamily:"inherit",resize:"vertical"}}/>
              <GBtn sm onClick={reviewHW} style={{marginTop:8}}>✅ {L==="ar"?"إرسال التصحيح":"Send Feedback"}</GBtn>
            </div>
          )}

          {/* Show teacher feedback */}
          {hw.teacherFeedback&&(
            <div style={{background:`${T.green}10`,border:`1px solid ${T.green}33`,borderRadius:10,padding:12,marginTop:10}}>
              <div style={{color:T.greenL,fontSize:12,fontWeight:700,marginBottom:4}}>✅ {L==="ar"?"تعليق المعلم:":"Teacher's Feedback:"}</div>
              <div style={{color:T.text,fontSize:13}}>{hw.teacherFeedback}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function HomeworkPage({currentUser,db,setDb,addNotif,L}){

    ?db.homeworks.filter(h=>h.teacherId===currentUser.id)

    if(!form.title||!form.studentId) return;
    const hw={id:Date.now(),...form,studentId:Number(form.studentId),teacherId:currentUser.id,status:"pending",studentNote:"",teacherFeedback:"",createdAt:Date.now()};

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{color:T.text,fontWeight:800,fontSize:15,marginBottom:3}}>
                    📖 {log.surahFrom}{log.surahTo&&log.surahTo!==log.surahFrom?` ← ${log.surahTo}`:""} ({log.versesFrom}-{log.versesTo})
                  </div>
                  <div style={{color:T.muted,fontSize:12}}>
                    {isTeacher?getName(st,L):getName(tc,L)} · {log.date} · {log.duration} {L==="ar"?"د":"min"}
                  </div>
                </div>
                <span style={{color:gradeColor[log.grade]||T.gold,fontWeight:800,fontSize:14,background:`${gradeColor[log.grade]||T.gold}15`,padding:"4px 12px",borderRadius:10}}>{log.grade}</span>
              </div>
              {log.notes&&<div style={{background:T.bg,borderRadius:10,padding:10,marginBottom:8,color:T.textD,fontSize:13}}>📝 {L==="ar"?log.notes:log.notesEn||log.notes}</div>}
              {log.errors?.length>0&&(
                <div style={{background:T.redBg,borderRadius:10,padding:10,marginBottom:8,border:`1px solid ${T.red}22`}}>
                  <div style={{color:T.redL,fontSize:12,fontWeight:700,marginBottom:4}}>⚠️ {L==="ar"?"الملاحظات والأخطاء:":"Notes & Errors:"}</div>
                  {log.errors.map((e,i)=><div key={i} style={{color:T.textD,fontSize:12}}>• {L==="ar"?e.error:e.errorEn||e.error}{e.verse?` (${L==="ar"?"الآية":"v."} ${e.verse})`:""}</div>)}
                </div>
              )}
              {log.nextTarget&&<div style={{background:`${T.gold}10`,borderRadius:10,padding:10,border:`1px solid ${T.gold}22`}}>
                <span style={{color:T.gold,fontSize:12,fontWeight:700}}>🎯 {L==="ar"?"الهدف القادم:":"Next Target:"}</span>
                <span style={{color:T.text,fontSize:13,marginRight:6}}> {L==="ar"?log.nextTarget:log.nextTargetEn||log.nextTarget}</span>
              </div>}
            </Card>
          );
        })
      }

      {showAdd&&<Modal title={`📖 ${L==="ar"?"توثيق حصة":"Log Session"}`} onClose={()=>setShowAdd(false)} w={560}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"الطالب":"Student"} value={form.studentId} onChange={f("studentId")} opts={[{v:"",l:L==="ar"?"اختر":"Choose"},...myStudents.map(s=>({v:s.id,l:getName(s,L)}))]}/>
          <Inp label={L==="ar"?"التاريخ":"Date"} value={form.date} onChange={f("date")} type="date"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
          <Inp label={L==="ar"?"من سورة":"From Surah"} value={form.surahFrom} onChange={f("surahFrom")} ph="البقرة"/>
          <Inp label={L==="ar"?"إلى سورة":"To Surah"} value={form.surahTo} onChange={f("surahTo")} ph="البقرة"/>
          <Inp label={L==="ar"?"من آية":"From"} value={form.versesFrom} onChange={f("versesFrom")} type="number" ph="1"/>
          <Inp label={L==="ar"?"إلى آية":"To"} value={form.versesTo} onChange={f("versesTo")} type="number" ph="15"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"التقييم":"Grade"} value={form.grade} onChange={f("grade")} opts={grades}/>
          <Inp label={L==="ar"?"المدة (دقائق)":"Duration (min)"} value={form.duration} onChange={f("duration")} type="number"/>
        </div>
        <Inp label={L==="ar"?"ملاحظات المعلم":"Teacher Notes"} value={form.notes} onChange={f("notes")} rows={2} ph={L==="ar"?"الطالب مجتهد...":"Student is diligent..."}/>
        <Inp label={L==="ar"?"الأخطاء (سطر لكل خطأ)":"Errors (one per line)"} value={form.errors} onChange={f("errors")} rows={2} ph={L==="ar"?"الإخفاء الشفوي\nمد الصلة":"Ikhfa Shafawi\nMedd As-Sila"}/>
        <Inp label={L==="ar"?"الهدف القادم":"Next Target"} value={form.nextTarget} onChange={f("nextTarget")} ph={L==="ar"?"الآيات 16-30":"Verses 16-30"}/>
        <GBtn full onClick={addLog}>📖 {L==="ar"?"حفظ سجل الحصة":"Save Session Log"}</GBtn>
      </Modal>}
    </div>
  );
}

//  RESOURCES LIBRARY
// ══════════════════════════════════════════════════════════════════════════════
function ResourcesPage({currentUser,db,setDb,addNotif,L}){
  const [showAdd,setShowAdd]=useState(false);
  const [filter,setFilter]=useState("all");
  const [form,setForm]=useState({title:"",titleEn:"",type:"pdf",url:"",level:"beginner",category:"tajweed"});
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const isAdmin=currentUser.role==="admin";
  const isTeacher=currentUser.role==="teacher";
  const canUpload=isAdmin||isTeacher;

  const cats=["all","tajweed","makharij","mutoon","memorization","general"];
  const catLabels={all:L==="ar"?"الكل":"All",tajweed:L==="ar"?"تجويد":"Tajweed",makharij:L==="ar"?"مخارج":"Makharij",mutoon:L==="ar"?"متون":"Mutoon",memorization:L==="ar"?"حفظ":"Memorization",general:L==="ar"?"عام":"General"};
  const typeIcons={pdf:"📄",video:"🎬",audio:"🎙",image:"🖼"};

  const filtered=filter==="all"?db.resources:db.resources.filter(r=>r.category===filter);

  const addRes=()=>{
    if(!form.title) return;
    setDb(p=>({...p,resources:[{id:Date.now(),...form,uploadedBy:currentUser.id,downloads:0,createdAt:Date.now()},...p.resources]}));
    setForm({title:"",titleEn:"",type:"pdf",url:"",level:"beginner",category:"tajweed"});
    setShowAdd(false);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700}}>
          📚 {L==="ar"?"مكتبة الموارد":"Resource Library"}
        </h2>
        {canUpload&&<GBtn sm onClick={()=>setShowAdd(true)}>+ {L==="ar"?"إضافة مورد":"Add Resource"}</GBtn>}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{background:filter===c?"rgba(201,168,76,.15)":"none",border:`1px solid ${filter===c?T.gold+"55":T.border}`,borderRadius:9,padding:"6px 14px",color:filter===c?T.gold:T.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit",transition:"all .2s"}}>
            {catLabels[c]} ({c==="all"?db.resources.length:db.resources.filter(r=>r.category===c).length})
          </button>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
        {filtered.map((res,i)=>{
          const uploader=db.users.find(u=>u.id===res.uploadedBy);
          return(
            <Card key={res.id} style={{animationDelay:`${i*60}ms`}} className="fu">
              <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
                <span style={{fontSize:32,flexShrink:0}}>{typeIcons[res.type]||"📄"}</span>
                <div>
                  <div style={{color:T.text,fontWeight:800,fontSize:14}}>{L==="ar"?res.title:res.titleEn||res.title}</div>
                  <div style={{color:T.muted,fontSize:11,marginTop:2}}>{catLabels[res.category]} · {L==="ar"?{beginner:"مبتدئ",intermediate:"متوسط",advanced:"متقدم"}[res.level]:res.level}</div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                <div style={{color:T.muted,fontSize:11}}>
                  📥 {res.downloads} {L==="ar"?"تحميل":"downloads"}
                  {uploader&&<span> · {getName(uploader,L)}</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  {res.url
                    ?<a href={res.url} target="_blank" rel="noopener noreferrer" style={{background:GG,color:"#04060d",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:700,textDecoration:"none",fontFamily:"inherit"}} onClick={()=>setDb(p=>({...p,resources:p.resources.map(r=>r.id===res.id?{...r,downloads:r.downloads+1}:r)}))}>
                        {L==="ar"?"فتح":"Open"}
                      </a>
                    :<span style={{color:T.muted,fontSize:11}}>{L==="ar"?"الرابط غير متاح":"Link unavailable"}</span>
                  }
                  {canUpload&&<button onClick={()=>setDb(p=>({...p,resources:p.resources.filter(r=>r.id!==res.id)}))} style={{background:"none",border:`1px solid ${T.red}33`,color:T.redL,borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:11}}>🗑</button>}
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {showAdd&&<Modal title={`📚 ${L==="ar"?"إضافة مورد":"Add Resource"}`} onClose={()=>setShowAdd(false)}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"العنوان (عربي)":"Title (Arabic)"} value={form.title} onChange={f("title")} ph="جدول التجويد..."/>
          <Inp label={L==="ar"?"العنوان (إنجليزي)":"Title (English)"} value={form.titleEn} onChange={f("titleEn")} ph="Tajweed chart..."/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"النوع":"Type"} value={form.type} onChange={f("type")} opts={[{v:"pdf",l:"PDF"},{v:"video",l:L==="ar"?"فيديو":"Video"},{v:"audio",l:L==="ar"?"صوتي":"Audio"},{v:"image",l:L==="ar"?"صورة":"Image"}]}/>
          <Inp label={L==="ar"?"المستوى":"Level"} value={form.level} onChange={f("level")} opts={[{v:"beginner",l:L==="ar"?"مبتدئ":"Beginner"},{v:"intermediate",l:L==="ar"?"متوسط":"Intermediate"},{v:"advanced",l:L==="ar"?"متقدم":"Advanced"}]}/>
          <Inp label={L==="ar"?"التصنيف":"Category"} value={form.category} onChange={f("category")} opts={cats.filter(c=>c!=="all").map(c=>({v:c,l:catLabels[c]}))}/>
        </div>
        <Inp label={L==="ar"?"الرابط (URL)":"Link (URL)"} value={form.url} onChange={f("url")} ph="https://..."/>
        <GBtn full onClick={addRes}>📚 {L==="ar"?"إضافة المورد":"Add Resource"}</GBtn>
      </Modal>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  EXAM SYSTEM
// ══════════════════════════════════════════════════════════════════════════════
function ExamPage({currentUser,db,setDb,addNotif,L}){
  const [taking,setTaking]=useState(null);
  const [answers,setAnswers]=useState({});
  const [result,setResult]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({title:"",titleEn:"",timeLimit:10,targetLevel:"beginner",questions:[]});
  const isTeacher=currentUser.role==="teacher";
  const isAdmin=currentUser.role==="admin";

  const myResults=db.examResults.filter(r=>r.studentId===currentUser.id);
  const availExams=db.exams.filter(e=>e.isActive&&!myResults.find(r=>r.examId===e.id));

  const submitExam=()=>{
    const exam=taking;
    let correct=0;
    exam.questions.forEach(q=>{if(Number(answers[q.id])===q.correct) correct++;});
    const score=Math.round(correct/exam.questions.length*100);
    const res={id:Date.now(),examId:exam.id,studentId:currentUser.id,score,correct,total:exam.questions.length,answers,submittedAt:Date.now()};
    setDb(p=>({...p,examResults:[...p.examResults,res]}));
    setResult({...res,exam});
    setTaking(null);
    addNotif({to:currentUser.id,type:score>=70?"success":"warning",title:L==="ar"?"نتيجة الاختبار":"Exam Result",body:`${score}% — ${correct}/${exam.questions.length}`});
  };

  if(taking) return(
    <div>
      <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:22,fontWeight:700,marginBottom:4}}>{L==="ar"?taking.title:taking.titleEn}</h2>
      <div style={{color:T.muted,fontSize:13,marginBottom:20}}>{taking.questions.length} {L==="ar"?"سؤال":"questions"} · {taking.timeLimit} {L==="ar"?"دقائق":"min"}</div>
      {taking.questions.map((q,qi)=>(
        <Card key={q.id} style={{marginBottom:14}}>
          <div style={{color:T.text,fontWeight:700,fontSize:15,marginBottom:14}}>
            {qi+1}. {L==="ar"?q.q:q.qEn||q.q}
          </div>
          <div style={{display:"grid",gap:8}}>
            {(L==="ar"?q.opts:q.optsEn||q.opts).map((opt,oi)=>(
              <button key={oi} onClick={()=>setAnswers(p=>({...p,[q.id]:oi}))} style={{
                background:answers[q.id]===oi?`${T.gold}15`:T.bg,
                border:`2px solid ${answers[q.id]===oi?T.gold:T.border}`,
                borderRadius:10,padding:"11px 14px",cursor:"pointer",
                color:answers[q.id]===oi?T.gold:T.text,fontWeight:answers[q.id]===oi?700:400,
                fontSize:14,fontFamily:"inherit",textAlign:"right",transition:"all .2s",
              }}>{opt}</button>
            ))}
          </div>
        </Card>
      ))}
      <div style={{display:"flex",gap:10}}>
        <GBtn onClick={submitExam} dis={Object.keys(answers).length<taking.questions.length}>✅ {L==="ar"?"إرسال الإجابات":"Submit Answers"}</GBtn>
        <GBtn ghost onClick={()=>{setTaking(null);setAnswers({});}}>{L==="ar"?"إلغاء":"Cancel"}</GBtn>
      </div>
    </div>
  );

  if(result) return(
    <div style={{textAlign:"center",maxWidth:460,margin:"0 auto"}}>
      <div style={{fontSize:64,marginBottom:12,animation:"breathe 2s ease infinite"}}>{result.score>=70?"🎉":"📖"}</div>
      <div className="sh" style={{fontFamily:"'Amiri',serif",fontSize:26,fontWeight:700,marginBottom:8}}>{L==="ar"?"نتيجتك":"Your Result"}</div>
      <div style={{fontSize:52,fontWeight:900,color:result.score>=70?T.greenL:T.redL,marginBottom:8}}>{result.score}%</div>
      <div style={{color:T.textD,fontSize:15,marginBottom:20}}>{result.correct}/{result.total} {L==="ar"?"إجابة صحيحة":"correct answers"}</div>
      <div style={{background:result.score>=70?`${T.green}15`:`${T.red}15`,border:`1px solid ${result.score>=70?T.green:T.red}33`,borderRadius:14,padding:16,marginBottom:20}}>
        <div style={{color:result.score>=70?T.greenL:T.redL,fontWeight:800,fontSize:16}}>
          {result.score>=90?(L==="ar"?"ممتاز 🌟":"Excellent 🌟"):result.score>=70?(L==="ar"?"جيد ✅":"Good ✅"):result.score>=50?(L==="ar"?"يحتاج مراجعة 📖":"Needs Review 📖"):(L==="ar"?"راجع المادة ⚠️":"Review Material ⚠️")}
        </div>
      </div>
      <GBtn onClick={()=>setResult(null)}>{L==="ar"?"العودة":"Back"}</GBtn>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700}}>
          📝 {L==="ar"?"الاختبارات":"Exams"}
        </h2>
        {(isTeacher||isAdmin)&&<GBtn sm onClick={()=>setShowAdd(true)}>+ {L==="ar"?"اختبار جديد":"New Exam"}</GBtn>}
      </div>

      {availExams.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{color:T.text,fontWeight:700,fontSize:14,marginBottom:12}}>📝 {L==="ar"?"اختبارات متاحة":"Available Exams"} ({availExams.length})</div>
          {availExams.map(exam=>(
            <Card key={exam.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:T.text,fontWeight:800,fontSize:14}}>{L==="ar"?exam.title:exam.titleEn||exam.title}</div>
                  <div style={{color:T.muted,fontSize:12,marginTop:2}}>{exam.questions.length} {L==="ar"?"سؤال":"questions"} · {exam.timeLimit} {L==="ar"?"دقائق":"min"}</div>
                </div>
                <GBtn sm onClick={()=>{setTaking(exam);setAnswers({});}}>📝 {L==="ar"?"ابدأ الاختبار":"Start Exam"}</GBtn>
              </div>
            </Card>
          ))}
        </div>
      )}

      {myResults.length>0&&(
        <div>
          <div style={{color:T.text,fontWeight:700,fontSize:14,marginBottom:12}}>📊 {L==="ar"?"نتائجي":"My Results"}</div>
          {myResults.map(r=>{
            const exam=db.exams.find(e=>e.id===r.examId);
            return <Card key={r.id} style={{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{color:T.text,fontWeight:700,fontSize:13}}>{exam?L==="ar"?exam.title:exam.titleEn:L==="ar"?"اختبار":"Exam"}</div>
                <div style={{color:T.muted,fontSize:11}}>{new Date(r.submittedAt).toLocaleDateString(L==="ar"?"ar-SA":"en-US")}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:900,color:r.score>=70?T.greenL:T.redL}}>{r.score}%</div>
                <div style={{color:T.muted,fontSize:11}}>{r.correct}/{r.total}</div>
              </div>
            </Card>;
          })}
        </div>
      )}

      {availExams.length===0&&myResults.length===0&&
        <div style={{textAlign:"center",color:T.muted,padding:"40px 0"}}>{L==="ar"?"لا توجد اختبارات متاحة":"No exams available"}</div>}

      {showAdd&&<Modal title={`📝 ${L==="ar"?"اختبار جديد":"New Exam"}`} onClose={()=>setShowAdd(false)} w={600}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"عنوان الاختبار (عربي)":"Title (Arabic)"} value={form.title} onChange={v=>setForm(p=>({...p,title:v}))} ph="اختبار التجويد..."/>
          <Inp label={L==="ar"?"عنوان الاختبار (إنجليزي)":"Title (English)"} value={form.titleEn} onChange={v=>setForm(p=>({...p,titleEn:v}))} ph="Tajweed Exam..."/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"المدة (دقائق)":"Duration (min)"} value={form.timeLimit} onChange={v=>setForm(p=>({...p,timeLimit:Number(v)}))} type="number"/>
          <Inp label={L==="ar"?"المستوى المستهدف":"Target Level"} value={form.targetLevel} onChange={v=>setForm(p=>({...p,targetLevel:v}))} opts={[{v:"beginner",l:L==="ar"?"مبتدئ":"Beginner"},{v:"intermediate",l:L==="ar"?"متوسط":"Intermediate"},{v:"advanced",l:L==="ar"?"متقدم":"Advanced"}]}/>
        </div>
        <div style={{background:T.bg,borderRadius:12,padding:14,marginBottom:12}}>
          <div style={{color:T.muted,fontSize:12,marginBottom:8}}>{L==="ar"?"الأسئلة المضافة:":"Added questions:"} {form.questions.length}</div>
          {form.questions.map((q,i)=>(
            <div key={i} style={{background:T.card,borderRadius:8,padding:"8px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:T.text,fontSize:12}}>{i+1}. {q.q.slice(0,50)}...</span>
              <button onClick={()=>setForm(p=>({...p,questions:p.questions.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:T.redL,cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          ))}
          <AddQuestionInline onAdd={q=>setForm(p=>({...p,questions:[...p.questions,q]}))} L={L}/>
        </div>
        <GBtn full onClick={()=>{
          if(!form.title||form.questions.length<1) return;
          setDb(p=>({...p,exams:[{id:Date.now(),...form,isActive:true,createdAt:Date.now()},...p.exams]}));
          setShowAdd(false);
        }}>📝 {L==="ar"?"إنشاء الاختبار":"Create Exam"}</GBtn>
      </Modal>}
    </div>
  );
}

function AddQuestionInline({onAdd,L}){
  const [q,setQ]=useState(""); const [qEn,setQEn]=useState("");
  const [opts,setOpts]=useState(["","","",""]);
  const [correct,setCorrect]=useState(0);
  const [show,setShow]=useState(false);
  if(!show) return <button onClick={()=>setShow(true)} style={{background:`${T.gold}15`,border:`1px solid ${T.gold}44`,color:T.gold,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",width:"100%",marginTop:6}}>+ {L==="ar"?"إضافة سؤال":"Add Question"}</button>;
  return(
    <div style={{background:T.bg2,borderRadius:10,padding:12,marginTop:8}}>
      <Inp label={L==="ar"?"السؤال (عربي)":"Question (Arabic)"} value={q} onChange={setQ} ph="ما حكم..."/>
      <Inp label={L==="ar"?"السؤال (إنجليزي)":"Question (English)"} value={qEn} onChange={setQEn} ph="What is the rule..."/>
      <div style={{color:T.muted,fontSize:12,marginBottom:6}}>{L==="ar"?"الخيارات (اضغط للتحديد كإجابة صحيحة):":"Options (click to mark correct):"}</div>
      <div style={{display:"grid",gap:6,marginBottom:10}}>
        {opts.map((o,i)=>(
          <div key={i} style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setCorrect(i)} style={{width:24,height:24,borderRadius:"50%",background:correct===i?T.gold:T.bg,border:`2px solid ${correct===i?T.gold:T.border}`,cursor:"pointer",flexShrink:0,fontSize:10,color:correct===i?"#04060d":T.muted,fontWeight:800}}>{i+1}</button>
            <input value={o} onChange={e=>{const n=[...opts];n[i]=e.target.value;setOpts(n);}} placeholder={`${L==="ar"?"خيار":"Option"} ${i+1}`} className="inp" style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 10px",color:T.text,fontSize:12,fontFamily:"inherit"}}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <GBtn sm onClick={()=>{if(!q||opts.some(o=>!o)) return;onAdd({id:Date.now(),q,qEn,opts,optsEn:opts,correct});setQ("");setQEn("");setOpts(["","",""]);setShow(false);}}>+ {L==="ar"?"إضافة":"Add"}</GBtn>
        <GBtn ghost sm onClick={()=>setShow(false)}>{L==="ar"?"إلغاء":"Cancel"}</GBtn>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  DIRECT CHAT
// ══════════════════════════════════════════════════════════════════════════════
function ChatPage({currentUser,db,setDb,L}){
  const [activeConv,setActiveConv]=useState(null);
  const [msg,setMsg]=useState("");
  const msgEndRef=useRef(null);

  const isTeacher=currentUser.role==="teacher";
  const isStudent=currentUser.role==="student";
  const isAdmin=currentUser.role==="admin";

  // Build conversations list
  let convUsers=[];
  if(isTeacher){
    convUsers=db.users.filter(u=>u.role==="student"&&u.teacherId===currentUser.id);
  } else if(isStudent){
    const tc=db.users.find(u=>u.id===currentUser.teacherId);
    if(tc) convUsers=[tc];
    // Also allow chatting with admin
    const adm=db.users.find(u=>u.role==="admin");
    if(adm) convUsers=[...convUsers,adm];
  } else if(isAdmin){
    convUsers=db.users.filter(u=>u.role!=="admin");
  }

  const getConvId=(a,b)=>[Math.min(a,b),Math.max(a,b)].join("_");

  const myConvs=activeConv?db.chatMessages.filter(m=>m.convId===getConvId(currentUser.id,activeConv.id)):[];

  useEffect(()=>{ msgEndRef.current?.scrollIntoView({behavior:"smooth"}); },[myConvs]);

  const send=()=>{
    if(!msg.trim()||!activeConv) return;
    const m={id:Date.now(),convId:getConvId(currentUser.id,activeConv.id),from:currentUser.id,to:activeConv.id,text:msg.trim(),time:Date.now(),read:false};
    setDb(p=>({...p,chatMessages:[...p.chatMessages,m]}));
    setMsg("");
  };

  const unreadCount=(userId)=>db.chatMessages.filter(m=>m.to===currentUser.id&&m.from===userId&&!m.read).length;

  return(
    <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:0,height:"calc(100vh - 180px)",background:T.card,borderRadius:16,border:`1px solid ${T.border}`,overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{borderLeft:`1px solid ${T.border}`,overflowY:"auto",background:T.panel}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,color:T.gold,fontWeight:800,fontSize:14}}>
          💬 {L==="ar"?"المحادثات":"Conversations"}
        </div>
        {convUsers.map(u=>{
          const unread=unreadCount(u.id);
          const lastMsg=db.chatMessages.filter(m=>m.convId===getConvId(currentUser.id,u.id)).slice(-1)[0];
          return(
            <div key={u.id} onClick={()=>{
              setActiveConv(u);
              setDb(p=>({...p,chatMessages:p.chatMessages.map(m=>m.convId===getConvId(currentUser.id,u.id)&&m.to===currentUser.id?{...m,read:true}:m)}));
            }} style={{padding:"12px 16px",cursor:"pointer",borderBottom:`1px solid ${T.border}22`,background:activeConv?.id===u.id?`${T.gold}10`:"transparent",transition:"background .2s"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{position:"relative"}}>
                  <UserAvatar user={u} s={36}/>
                  {unread>0&&<span style={{position:"absolute",top:-3,right:-3,width:16,height:16,borderRadius:"50%",background:T.red,color:"#fff",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:T.text,fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{getName(u,L)}</div>
                  {lastMsg&&<div style={{color:T.muted,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lastMsg.text.slice(0,30)}</div>}
                </div>
              </div>
            </div>
          );
        })}
        {!convUsers.length&&<div style={{padding:20,color:T.muted,fontSize:13,textAlign:"center"}}>{L==="ar"?"لا توجد محادثات":"No conversations"}</div>}
      </div>

      {/* Chat area */}
      {activeConv?(
        <div style={{display:"flex",flexDirection:"column"}}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12,background:T.panel}}>
            <UserAvatar user={activeConv} s={36}/>
            <div>
              <div style={{color:T.text,fontWeight:800,fontSize:14}}>{getName(activeConv,L)}</div>
              <div style={{color:T.muted,fontSize:11}}>{activeConv.role==="teacher"?L==="ar"?"معلم":"Teacher":activeConv.role==="admin"?L==="ar"?"مشرف":"Admin":L==="ar"?"طالب":"Student"}</div>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:8}}>
            {myConvs.length===0&&<div style={{textAlign:"center",color:T.muted,padding:"40px 0",fontSize:13}}>{L==="ar"?"ابدأ المحادثة":"Start the conversation"}</div>}
            {myConvs.map(m=>{
              const mine=m.from===currentUser.id;
              return(
                <div key={m.id} style={{display:"flex",justifyContent:mine?"flex-start":"flex-end"}}>
                  <div style={{maxWidth:"70%",background:mine?`${T.gold}15`:T.card,border:`1px solid ${mine?T.gold+"33":T.border}`,borderRadius:mine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px"}}>
                    <div style={{color:T.text,fontSize:13,lineHeight:1.6}}>{m.text}</div>
                    <div style={{color:T.muted,fontSize:10,marginTop:4,textAlign:mine?"left":"right"}}>{ago(m.time,L)}</div>
                  </div>
                </div>
              );
            })}
            <div ref={msgEndRef}/>
          </div>
          <div style={{padding:12,borderTop:`1px solid ${T.border}`,display:"flex",gap:8}}>
            <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder={L==="ar"?"اكتب رسالتك...":"Type your message..."} className="inp"
              style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 14px",color:T.text,fontSize:14,fontFamily:"inherit"}}/>
            <GBtn sm onClick={send} dis={!msg.trim()}>↑</GBtn>
          </div>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,fontSize:14}}>
          {L==="ar"?"اختر محادثة للبدء":"Select a conversation to start"}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  CERTIFICATES
// ══════════════════════════════════════════════════════════════════════════════
function CertificatePage({currentUser,db,setDb,addNotif,L}){
  const isAdmin=currentUser.role==="admin";
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({studentId:"",title:"",titleEn:"",desc:"",descEn:"",type:"completion"});
  const f=k=>v=>setForm(p=>({...p,[k]:v}));

  // Ensure certificates array always exists
  const allCerts = db.certificates || [];
  const myCerts = currentUser.role==="student"
    ? allCerts.filter(c=>c.studentId===currentUser.id)
    : allCerts;

  const issue=()=>{
    if(!form.studentId||!form.title){
      addNotif({to:currentUser.id,type:"warning",
        title:L==="ar"?"بيانات ناقصة":"Missing Info",
        body:L==="ar"?"اختر الطالب وأدخل عنوان الشهادة":"Choose student and enter certificate title"
      });
      return;
    }
    const sid = Number(form.studentId);
    const cert={
      id:Date.now(),
      studentId:sid,
      title:form.title,
      titleEn:form.titleEn||form.title,
      desc:form.desc,
      descEn:form.descEn||form.desc,
      type:form.type,
      issuedBy:currentUser.id,
      issuedAt:Date.now(),
      certNo:`MUK-${Date.now().toString().slice(-6)}`
    };
    setDb(p=>({...p, certificates:[...(p.certificates||[]), cert]}));
    addNotif({to:sid,type:"success",
      title:L==="ar"?"🏆 شهادة جديدة!":"🏆 New Certificate!",
      body:L==="ar"?form.title:form.titleEn||form.title
    });
    setForm({studentId:"",title:"",titleEn:"",desc:"",descEn:"",type:"completion"});
    setShowAdd(false);
  };

  const printCert=(cert)=>{
    const student=db.users.find(u=>u.id===cert.studentId);
    const cfg=getSiteCfg();
    const win=window.open("","_blank");
    win.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>شهادة</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
      body{margin:0;padding:0;background:#fff;font-family:'Amiri',serif;}
      .cert{width:800px;min-height:560px;margin:20px auto;background:linear-gradient(135deg,#fffdf5,#fff8e7);border:12px double #c9a84c;border-radius:16px;padding:50px;text-align:center;position:relative;}
      .border2{position:absolute;inset:18px;border:3px solid #c9a84c44;border-radius:10px;pointer-events:none;}
      .title{font-size:42px;color:#7a5f28;margin-bottom:8px;font-weight:700;}
      .subtitle{font-size:20px;color:#9a8868;margin-bottom:30px;}
      .name{font-size:36px;color:#c9a84c;font-weight:700;border-bottom:2px solid #c9a84c;padding-bottom:8px;display:inline-block;margin:10px 0;}
      .body{font-size:18px;color:#555;line-height:2;margin:16px 0;}
      .footer{margin-top:40px;display:flex;justify-content:space-between;}
      .sig{text-align:center;border-top:1px solid #c9a84c;padding-top:8px;font-size:14px;color:#888;min-width:140px;}
      .no{font-size:12px;color:#aaa;margin-top:30px;}
      .logo{font-size:48px;margin-bottom:12px;}
    </style></head><body>
    <div class="cert"><div class="border2"></div>
      <div class="logo">${cfg.logoEmoji||"☪️"}</div>
      <div class="title">${cfg.academyNameAr||"أكاديمية مكنون"}</div>
      <div class="subtitle">شهادة ${cert.type==="completion"?"إتمام":"إجازة"}</div>
      <div class="body">تشهد ${cfg.academyNameAr||"أكاديمية مكنون"} بأن الطالب/ة</div>
      <div class="name">${student?.name||""}</div>
      <div class="body">${cert.desc||cert.title}<br/>وذلك بتاريخ ${new Date(cert.issuedAt).toLocaleDateString("ar-SA")}</div>
      <div class="footer">
        <div class="sig">توقيع المشرف<br/>________________</div>
        <div class="sig">توقيع المعلم<br/>________________</div>
        <div class="sig">الختم الرسمي<br/>${cfg.logoEmoji||"☪️"}</div>
      </div>
      <div class="no">رقم الشهادة: ${cert.certNo}</div>
    </div></body></html>`);
    win.document.close(); win.print();
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700}}>
          🏆 {L==="ar"?"الشهادات":"Certificates"}
        </h2>
        {isAdmin&&<GBtn sm onClick={()=>setShowAdd(true)}>+ {L==="ar"?"إصدار شهادة":"Issue Certificate"}</GBtn>}
      </div>

      {myCerts.length===0
        ?<div style={{textAlign:"center",color:T.muted,padding:"40px 0"}}>{L==="ar"?"لا توجد شهادات بعد":"No certificates yet"}</div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {myCerts.map(cert=>{
            const student=db.users.find(u=>u.id===cert.studentId);
            return(
              <div key={cert.id} style={{background:`linear-gradient(135deg,${T.card},#1a1204)`,border:`2px solid ${T.gold}44`,borderRadius:18,padding:22,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:0,right:0,left:0,height:4,background:`linear-gradient(90deg,transparent,${T.gold},transparent)`}}/>
                <div style={{fontSize:36,marginBottom:10}}>🏆</div>
                <div style={{color:T.gold,fontWeight:800,fontSize:16,marginBottom:4}}>{L==="ar"?cert.title:cert.titleEn||cert.title}</div>
                {!isAdmin&&student&&<div style={{color:T.textD,fontSize:13,marginBottom:4}}>{getName(student,L)}</div>}
                <div style={{color:T.muted,fontSize:12,marginBottom:10}}>📅 {new Date(cert.issuedAt).toLocaleDateString(L==="ar"?"ar-SA":"en-US")}</div>
                <div style={{color:T.muted,fontSize:11,marginBottom:12,fontFamily:"monospace"}}>#{cert.certNo}</div>
                <GBtn ghost sm full onClick={()=>printCert(cert)}>🖨 {L==="ar"?"طباعة الشهادة":"Print Certificate"}</GBtn>
              </div>
            );
          })}
        </div>
      }

      {showAdd&&<Modal title={`🏆 ${L==="ar"?"إصدار شهادة":"Issue Certificate"}`} onClose={()=>setShowAdd(false)}>
        <Inp label={L==="ar"?"الطالب":"Student"} value={form.studentId} onChange={f("studentId")} opts={[{v:"",l:L==="ar"?"اختر":"Choose"},...db.users.filter(u=>u.role==="student").map(s=>({v:s.id,l:getName(s,L)}))]}/>
        <Inp label={L==="ar"?"نوع الشهادة":"Certificate Type"} value={form.type} onChange={f("type")} opts={[{v:"completion",l:L==="ar"?"شهادة إتمام":"Completion"},{v:"ijaza",l:L==="ar"?"إجازة":"Ijaza"},{v:"excellence",l:L==="ar"?"تفوق":"Excellence"},{v:"participation",l:L==="ar"?"مشاركة":"Participation"}]}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"العنوان (عربي)":"Title (Arabic)"} value={form.title} onChange={f("title")} ph="إتمام حفظ القرآن..."/>
          <Inp label={L==="ar"?"العنوان (إنجليزي)":"Title (English)"} value={form.titleEn} onChange={f("titleEn")} ph="Quran Completion..."/>
        </div>
        <Inp label={L==="ar"?"نص الشهادة":"Certificate Body"} value={form.desc} onChange={f("desc")} rows={2} ph={L==="ar"?"أتمّ حفظ القرآن الكريم كاملاً...":"Has completed full Quran memorization..."}/>
        <GBtn full onClick={issue}>🏆 {L==="ar"?"إصدار الشهادة":"Issue Certificate"}</GBtn>
      </Modal>}
    </div>
  );
}

function ParentPortal({user,db,L}){

  const childLogs=myChild?db.sessionLogs.filter(l=>l.studentId===myChild.id):[];

  if(!myChild) return <div style={{textAlign:"center",color:T.muted,padding:"60px 0",fontSize:14}}>{L==="ar"?"لم يتم ربط حساب الطالب بعد":"No student linked to this account"}</div>;

      {/* Progress */}
      <Card style={{marginBottom:14,background:`linear-gradient(135deg,${T.card},${T.panel})`}}>

          <div style={{color:T.text,fontWeight:700,fontSize:14}}>📈 {L==="ar"?"تقدم الحفظ":"Memorization Progress"}</div>
          <span style={{color:T.gold,fontWeight:900,fontSize:20}}>{myChild.progress||0}%</span>
        </div>
        <div style={{background:T.bg,borderRadius:10,height:14,overflow:"hidden",marginBottom:6}}>
          <div style={{width:`${myChild.progress||0}%`,height:"100%",background:`linear-gradient(90deg,${T.goldD},${T.gold},${T.goldL})`,borderRadius:10}}/>
        </div>
        <div style={{color:T.muted,fontSize:12}}>{L==="ar"?"المحفوظ:":"Memorized:"} {myChild.memorized}</div>
      </Card>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:14}}>

          {icon:"📅",l:L==="ar"?"الحصص":"Sessions",v:childSessions.length,c:T.blueL},

      {/* Recent logs */}
      {childLogs.slice(0,3).map(log=>(
        <Card key={log.id} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

          {log.notes&&<div style={{color:T.textD,fontSize:12,marginTop:8}}>📝 {log.notes}</div>}
        </Card>
      ))}
    </div>
  );
}

//  AUTO REMINDER SYSTEM
// ══════════════════════════════════════════════════════════════════════════════
function useReminders(db,addNotif,currentUser,L){
  useEffect(()=>{
    if(!currentUser) return;
    const check=()=>{
      const now=new Date();
      const todayName=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][now.getDay()];
      const nowMin=now.getHours()*60+now.getMinutes();

      db.sessions.filter(s=>s.status==="confirmed"&&s.day===todayName).forEach(s=>{
        if(!s.time) return;
        const [sh,sm]=s.time.split(":").map(Number);
        const sessionMin=sh*60+sm;
        const diff=sessionMin-nowMin;

        const notifKey=`reminded_${s.id}_${now.toDateString()}`;
        if(diff===60&&!sessionStorage.getItem(notifKey+"_60")){
          sessionStorage.setItem(notifKey+"_60","1");
          if(s.studentId===currentUser.id||s.teacherId===currentUser.id){
            addNotif({to:currentUser.id,type:"warning",
              title:L==="ar"?"⏰ تذكير بالحصة":"⏰ Session Reminder",
              body:L==="ar"?`حصتك بعد ساعة الساعة ${s.time}`:`Your session in 1 hour at ${s.time}`,
            });
          }
        }
        if(diff===15&&!sessionStorage.getItem(notifKey+"_15")){
          sessionStorage.setItem(notifKey+"_15","1");
          if(s.studentId===currentUser.id||s.teacherId===currentUser.id){
            addNotif({to:currentUser.id,type:"warning",
              title:L==="ar"?"⏰ الحصة بعد 15 دقيقة!":"⏰ Session in 15 minutes!",
              body:L==="ar"?`حصتك الساعة ${s.time} — استعد!`:`Your session at ${s.time} — get ready!`,
            });
          }
        }
      });
    };
    check();
    const interval=setInterval(check,60000);
    return()=>clearInterval(interval);
  },[db.sessions,currentUser?.id]);
}

    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);

                <span style={{fontSize:14}}>{a.important?"📌":"📄"}</span>
                <span style={{color:T.text,fontWeight:800,fontSize:14}}>{L==="en"&&a.titleEn?a.titleEn:a.title}</span>
                {a.important&&<Bdg c="gold" sm>{L==="ar"?"مهم":"Important"}</Bdg>}
              </div>
              <div style={{color:T.textD,fontSize:12,lineHeight:1.7,marginBottom:5}}>{L==="en"&&a.bodyEn?a.bodyEn:a.body}</div>
              <div style={{color:T.muted,fontSize:10}}>{a.date} · {a.author}</div>
            </div>
            <button onClick={()=>setDb(p=>({...p,announcements:p.announcements.filter(x=>x.id!==a.id)}))} style={{background:"none",border:`1px solid ${T.red}33`,color:T.redL,borderRadius:7,padding:"4px 8px",cursor:"pointer",fontSize:11,flexShrink:0}}>🗑</button>
          </div>
        </Card>
      ))}
      {show&&<Modal title={L==="ar"?"📢 إعلان جديد":"📢 New Announcement"} onClose={()=>setShow(false)}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={L==="ar"?"العنوان عربي":"Title (Arabic)"} value={form.title} onChange={f("title")} ph="عنوان..."/>
          <Inp label={L==="ar"?"العنوان إنجليزي":"Title (English)"} value={form.titleEn} onChange={f("titleEn")} ph="Title..."/>
        </div>
        <Inp label={L==="ar"?"النص عربي":"Body (Arabic)"} value={form.body} onChange={f("body")} rows={3} ph="تفاصيل..."/>
        <Inp label={L==="ar"?"النص إنجليزي":"Body (English)"} value={form.bodyEn} onChange={f("bodyEn")} rows={3} ph="Details..."/>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,cursor:"pointer"}} onClick={()=>setForm(p=>({...p,important:!p.important}))}>
          <div style={{width:20,height:20,borderRadius:6,background:form.important?T.gold:T.bg,border:`2px solid ${form.important?T.gold:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>{form.important&&<span style={{color:"#04060d",fontSize:11,fontWeight:800}}>✓</span>}</div>
          <span style={{color:T.textD,fontSize:13}}>{t(L,"importantAnn")}</span>
        </div>
        <GBtn full onClick={add}>📢 {t(L,"publishAnnouncement")}</GBtn>
      </Modal>}
    </div>
  );
}

// ─────────────────────────── APP ROOT ────────────────────────────────────────
function App(){
  const [db,setDb]=useState(()=>load());
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("home");
  const [toast,setToast]=useState(null);
  const [screen,setScreen]=useState("lang"); // lang | login | register
  const [L,setL]=useState("ar");

  useEffect(()=>{persist(db);},[db]);

  // Browser back button support
  useEffect(()=>{
    const handlePop=()=>{ setPage(p=>p==="home"?p:"home"); };
    window.addEventListener("popstate",handlePop);
    return()=>window.removeEventListener("popstate",handlePop);
  },[]);

  useEffect(()=>{
    if(user&&page) window.history.pushState({page},"",window.location.pathname);
  },[page,user]);

  const addNotif=useCallback(n=>{
    const notif={id:Date.now(),...n,time:Date.now(),readBy:[]};
    setDb(p=>({...p,notifications:[notif,...p.notifications]}));
    setToast(notif);
  },[]);

  const markRead=id=>setDb(p=>({...p,notifications:p.notifications.map(n=>n.id===id?{...n,readBy:[...(n.readBy||[]).filter(x=>x!==user?.id),user?.id]}:n)}));

  const changeLang=newL=>{setL(newL);setDb(p=>({...p,lang:newL}));};

  const handleLogin=u=>{setUser(u);setPage("home");setScreen("login");addNotif({to:u.id,type:"success",title:L==="ar"?"أهلاً بك 👋":"Welcome 👋",titleEn:"Welcome 👋",body:L==="ar"?`مرحباً ${getName(u,L)}`:`Hello ${getName(u,L)}`,bodyEn:`Hello ${getName(u,L)}`});};
  const handleLogout=()=>{setUser(null);setPage("home");};

  const handleRegSubmit=req=>{
    setDb(p=>{
      const adminNotif={id:Date.now(),to:1,type:"warning",
        title:L==="ar"?"📋 طلب تسجيل جديد":"📋 New Registration Request",
        titleEn:"📋 New Registration Request",
        body:`${req.name} · ${req.dialCode} ${req.phone} · ${COUNTRIES.find(c=>c.code===req.country)?.[L==="ar"?"ar":"en"]||""}`,
        bodyEn:`${req.name} · ${req.dialCode} ${req.phone}`,
        time:Date.now(),readBy:[]};
      return{...p,regRequests:[...(p.regRequests||[]),req],notifications:[adminNotif,...p.notifications]};
    });
  };

  const handleAutoLogin=reqObj=>{setUser({...reqObj,role:"pending_student"});setScreen("login");setPage("home");};

  const pendingRegs=(db.regRequests||[]).filter(r=>r.status==="pending").length;
  const NAV=mkNav(pendingRegs,L);

  // Screen: language selector
  if(screen==="lang") return(<><style>{CSS}</style><LanguageSelector onSelect={ll=>{setL(ll);setScreen("login");}}/></>);

  // Screen: register
  if(!user&&screen==="register") return(<><style>{CSS}</style><Register db={db} onBack={()=>setScreen("login")} onSubmit={(req,cb)=>{handleRegSubmit(req);if(cb)cb();}} onAutoLogin={handleAutoLogin} L={L}/></>);

  // Screen: login
  if(!user) return(<><style>{CSS}</style><Login db={db} onLogin={handleLogin} onRegister={()=>setScreen("register")} onLangChange={changeLang} L={L}/></>);

  // Resolve current user — single declaration
  const currentUser = db.users.find(u=>u.id===user?.id)||user;
  if(!currentUser) return null;

  // Parent portal — full layout with nav
  if(currentUser.role==="parent"){
    const parentNavItems = mkNav(0,L).parent;
    const myChild = db.users.find(u=>u.role==="student"&&(u.parentName===currentUser.name||u.id===currentUser.childId));
    const renderParentPage = () => {
      if(page==="p-progress"||page==="home") return <ParentPortal user={currentUser} db={db} L={L}/>;
      if(page==="p-sessions") return(
        <div>
          <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:18}}>{L==="ar"?"📅 حصص ابني":"📅 Child's Sessions"}</h2>
          {myChild?db.sessions.filter(s=>s.studentId===myChild.id).map(s=>{
            const tc=db.users.find(u=>u.id===s.teacherId);
            return <Card key={s.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:T.text,fontWeight:700,fontSize:14}}>{t(L,s.type)} · {s.day} {s.time}</div>
                  <div style={{color:T.muted,fontSize:12}}>{L==="ar"?"مع":"With"} {getName(tc,L)} · {s.duration} {L==="ar"?"دقيقة":"min"}</div>
                </div>
                <Bdg c={s.status==="confirmed"?"green":s.status==="awaiting"?"gold":"muted"} dot sm>{t(L,s.status==="confirmed"?"confirmed":s.status==="awaiting"?"awaiting":"completed")}</Bdg>
              </div>
            </Card>;
          }):<div style={{textAlign:"center",color:T.muted,padding:"40px 0"}}>{L==="ar"?"لم يتم ربط حساب الطالب":"No student linked"}</div>}
        </div>
      );
      if(page==="p-homework") return myChild
        ?<HomeworkPage currentUser={myChild} db={db} setDb={setDb} addNotif={addNotif} L={L}/>
        :<div style={{textAlign:"center",color:T.muted,padding:"40px 0"}}>{L==="ar"?"لم يتم ربط حساب الطالب":"No student linked"}</div>;
      if(page==="p-logs") return myChild
        ?<SessionLogPage currentUser={myChild} db={db} setDb={setDb} addNotif={addNotif} L={L}/>
        :<div style={{textAlign:"center",color:T.muted,padding:"40px 0"}}>{L==="ar"?"لم يتم ربط حساب الطالب":"No student linked"}</div>;
      if(page==="p-certs") return myChild
        ?<CertificatePage currentUser={myChild} db={db} setDb={setDb} addNotif={addNotif} L={L}/>
        :<div style={{textAlign:"center",color:T.muted,padding:"40px 0"}}>{L==="ar"?"لم يتم ربط حساب الطالب":"No student linked"}</div>;
      if(page==="p-chat") return <ChatPage currentUser={currentUser} db={db} setDb={setDb} L={L}/>;
      return <ParentPortal user={currentUser} db={db} L={L}/>;
    };
    return(
      <div dir={LANG[L].dir} style={{minHeight:"100vh",background:BG,color:T.text,fontFamily:LANG[L].font,backgroundImage:PAT}}>
        <style>{CSS}</style>
        {toast&&<Toast n={toast} onClose={()=>setToast(null)}/>}
        <Header user={currentUser} onLogout={handleLogout} notifs={db.notifications||[]} markRead={markRead} navItems={parentNavItems} page={page} setPage={setPage} L={L} onLangChange={changeLang}/>
        <main style={{maxWidth:900,margin:"0 auto",padding:"24px 16px"}}>{renderParentPage()}</main>
        <footer style={{borderTop:`1px solid ${T.border}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><LogoCircle size={22} glow={false}/><AcademyName L={L} className="sh" style={{fontFamily:"'Amiri',serif",fontSize:13,fontWeight:700}}/></div>
          <div style={{color:T.muted,fontSize:11}}>👨‍👦 {L==="ar"?"لوحة ولي الأمر":"Parent Portal"}</div>
        </footer>
      </div>
    );
  }

  // Pending student
  if(currentUser.role==="pending_student"){
    const latestReq=db.regRequests?.find(r=>r.id===currentUser.id)||currentUser;
    if(latestReq.status==="approved"){const fu=db.users.find(u=>u.un===latestReq.un);if(fu){setUser(fu);return null;}}
    return <PendingPage req={latestReq} db={db} onLogout={handleLogout} L={L}/>;
  }

  const navItems=NAV[currentUser.role]||NAV.student;

  return(
    <div dir={LANG[L].dir} style={{minHeight:"100vh",background:BG,color:T.text,fontFamily:LANG[L].font,backgroundImage:PAT}}>
      <style>{CSS}</style>
      {toast&&<Toast n={toast} onClose={()=>setToast(null)}/>}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
        <div style={{position:"absolute",top:"4%",right:"2%",width:500,height:500,borderRadius:"50%",background:`radial-gradient(circle,${T.gold}03,transparent 70%)`}}/>
        <div style={{position:"absolute",bottom:"4%",left:"2%",width:350,height:350,borderRadius:"50%",background:`radial-gradient(circle,${T.green}03,transparent 70%)`}}/>
      </div>
      <div style={{position:"relative",zIndex:1}}>
        <Header user={currentUser} onLogout={handleLogout} notifs={db.notifications||[]} markRead={markRead} navItems={navItems} page={page} setPage={setPage} L={L} onLangChange={changeLang}/>
        <main style={{maxWidth:1260,margin:"0 auto",padding:"24px 16px",minHeight:"calc(100vh - 110px)"}}>
          {currentUser.role==="admin"   && <AdminPortal   user={currentUser} db={db} setDb={setDb} addNotif={addNotif} page={page} setPage={setPage} L={L}/>}
          {currentUser.role==="teacher" && <TeacherPortal user={currentUser} db={db} setDb={setDb} addNotif={addNotif} page={page} setPage={setPage} L={L}/>}
          {currentUser.role==="student" && <StudentPortal user={currentUser} db={db} setDb={setDb} addNotif={addNotif} page={page} setPage={setPage} L={L}/>}
        </main>
        <footer style={{borderTop:`1px solid ${T.border}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><LogoCircle size={24} glow={false}/><AcademyName L={L} className="sh" style={{fontFamily:"'Amiri',serif",fontSize:13,fontWeight:700}}/></div>
          <div style={{color:T.muted,fontSize:11}}>🌍 Global · {L==="ar"?"البيانات محفوظة تلقائياً":"Auto-saved"} · {new Date().getFullYear()}</div>
        </footer>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

setTimeout(function(){
  var s=document.getElementById("splash");
  if(s){s.style.opacity="0";s.style.transition="opacity 0.6s";setTimeout(function(){s.remove();},600);}
},800);

  </script>
</body>
</html>
