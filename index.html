  <style>
    *{margin:0;padding:0;box-sizing:border-box}html,body,#root{min-height:100vh}
    body{background:#04060d;font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased}
    #splash{position:fixed;inset:0;background:#04060d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:12px;transition:opacity .6s ease}
    .sp-logo{width:88px;height:88px;border-radius:50%;overflow:hidden;border:3px solid #c9a84c;box-shadow:0 0 40px rgba(201,168,76,.45);animation:g 2.5s ease infinite}
    .sp-logo img{width:100%;height:100%;object-fit:cover}
    .sp-name{font-family:'Amiri',serif;font-size:24px;font-weight:700;color:#c9a84c}
    .sp-sub{color:#3d5070;font-size:11px;letter-spacing:3px}
    .sp-ring{width:28px;height:28px;border-radius:50%;border:3px solid #16243e;border-top-color:#c9a84c;animation:r .8s linear infinite}
    @keyframes g{0%,100%{box-shadow:0 0 20px #c9a84c33}50%{box-shadow:0 0 50px #c9a84c77}}
    @keyframes r{to{transform:rotate(360deg)}}
  </style>
</head>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Amiri:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#04060d}
::-webkit-scrollbar-thumb{background:#16243e;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#c9a84c44}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-400% center}100%{background-position:400% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 18px #c9a84c18}50%{box-shadow:0 0 48px #c9a84c44}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes liveRing{0%{box-shadow:0 0 0 0 rgba(220,38,38,.6)}70%{box-shadow:0 0 0 12px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fu{animation:fadeUp .45s ease both}
.fi{animation:fadeIn .35s ease both}
.sh{background:linear-gradient(90deg,#c9a84c,#f0d078,#c9a84c,#7a5f28,#f0d078,#c9a84c);background-size:400% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 6s linear infinite}
.hov{transition:all .22s ease}
.hov:hover{background:#0f1c32!important;border-color:#c9a84c2a!important;transform:translateY(-2px)}
.nav-btn{transition:all .2s ease}
.nav-btn:hover,.nav-btn.on{background:rgba(201,168,76,.1)!important;color:#c9a84c!important;border-color:#c9a84c44!important}
.gbtn{transition:all .2s ease}
.gbtn:hover{filter:brightness(1.12);box-shadow:0 6px 30px rgba(201,168,76,.5)!important;transform:translateY(-1px)}
.rbtn:hover{border-color:#ef4444!important;color:#ef4444!important}
.inp:focus{border-color:#c9a84c55!important;box-shadow:0 0 0 3px rgba(201,168,76,.06)!important;outline:none}
select option{background:#0b1526;color:#ede5d5}
