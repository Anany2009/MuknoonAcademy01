<style>*{margin:0;padding:0;box-sizing:border-box}html,body,#root{min-height:100vh}
body{background:#faf6ee;font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased}
#splash{position:fixed;inset:0;background:linear-gradient(150deg,#faf6ee,#f3ebda,#faf6ee);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:14px;transition:opacity .6s ease}
.sp-logo{width:130px;height:130px;border-radius:50%;overflow:hidden;background:#fff;border:4px solid #c9a84c;box-shadow:0 0 55px rgba(201,168,76,.45),0 12px 50px rgba(168,134,46,.2);animation:g 2.5s ease infinite}
.sp-logo img{width:100%;height:100%;object-fit:cover}.sp-name{font-family:'Amiri',serif;font-size:28px;font-weight:700;color:#a8862e}

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Amiri:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f3ebda}
::-webkit-scrollbar-thumb{background:#d4b96a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#a8862e}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-400% center}100%{background-position:400% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 18px #c9a84c33}50%{box-shadow:0 0 48px #c9a84c66}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes liveRing{0%{box-shadow:0 0 0 0 rgba(220,38,38,.6)}70%{box-shadow:0 0 0 12px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
@keyframes liveBannerPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.08)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fu{animation:fadeUp .45s ease both}
.fi{animation:fadeIn .35s ease both}
.sh{background:linear-gradient(90deg,#a8862e,#c9a84c,#f0d078,#a8862e,#c9a84c);background-size:400% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 6s linear infinite}
.hov{transition:all .22s ease}
.hov:hover{background:#f7f0e2!important;border-color:#c9a84c44!important;transform:translateY(-2px);box-shadow:0 8px 24px rgba(168,134,46,.12)!important}
.nav-btn{transition:all .2s ease}
.nav-btn:hover,.nav-btn.on{background:rgba(201,168,76,.14)!important;color:#a8862e!important;border-color:#c9a84c55!important}
.gbtn{transition:all .2s ease}
.gbtn:hover{filter:brightness(1.06);box-shadow:0 6px 26px rgba(168,134,46,.35)!important;transform:translateY(-1px)}
.rbtn:hover{border-color:#dc2626!important;color:#dc2626!important}
.inp:focus{border-color:#c9a84c!important;box-shadow:0 0 0 3px rgba(201,168,76,.14)!important;outline:none}
select option{background:#fffdf8;color:#2c2418}
.tr:hover>td{background:#f7f0e2!important}
.lang-btn:hover{background:rgba(201,168,76,.2)!important;border-color:#a8862e!important}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 MOBILE RESPONSIVE \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.bottom-nav{display:none}
@media(max-width:768px){
  /* Top header: compact, hide the inline nav (moves to bottom bar) */
  .app-header{padding:0 12px!important;height:56px!important}
  .app-header .top-nav{display:none!important}
  .app-header .user-name-block{display:none!important}
  .app-header .logout-btn-wrap{display:none!important}
  .app-header .academy-sub{display:none!important}

  /* Bottom fixed navigation bar (like Instagram/WhatsApp) */
  .bottom-nav{
    display:flex!important;position:fixed;bottom:0;left:0;right:0;z-index:600;
    background:rgba(255,253,248,.97);backdrop-filter:blur(20px);
    border-top:1px solid #e3d5b0;padding:6px 4px;
    box-shadow:0 -4px 24px rgba(168,134,46,.1);
    padding-bottom:max(6px,env(safe-area-inset-bottom));
    justify-content:space-around;align-items:stretch;gap:2px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .bottom-nav button{
    background:none;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:5px 8px;border-radius:12px;min-width:58px;flex-shrink:0;
    color:#8a7d63;transition:all .2s;font-family:inherit;
  }
  .bottom-nav button.on{color:#c9a84c;background:rgba(201,168,76,.12)}
  .bottom-nav button .bn-ic{font-size:20px;line-height:1}
  .bottom-nav button .bn-lb{font-size:9px;font-weight:700;white-space:nowrap}

  /* Give page content room above the bottom bar */
  .app-main{padding:16px 12px 90px!important;min-height:auto!important}

  /* Cards & grids stack nicely */
  .stat-grid{grid-template-columns:repeat(2,1fr)!important}

  /* Footer hidden on mobile (bottom nav takes its place) */
  .app-footer{display:none!important}

  /* Modals full-width on small screens */
  .modal-box{width:94vw!important;max-width:94vw!important;max-height:88vh!important}
}
@media(max-width:380px){
  .bottom-nav button{min-width:50px;padding:5px 5px}
  .bottom-nav button .bn-lb{font-size:8px}
