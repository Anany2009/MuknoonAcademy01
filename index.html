// ─────────────────────────── SITE CONFIG HELPER ──────────────────────────────
const getSiteCfg = () => {
  try {
    const raw = localStorage.getItem("muk_v5");
    if (raw) { const d = JSON.parse(raw); return d.siteSettings || {}; }
  } catch {}
  return {};
};

function LogoCircle({size=80, glow=true}){
  const cfg  = getSiteCfg();
  const url  = cfg.logoUrl   || "";
  const emoji= cfg.logoEmoji || "☪️";
  const gold = cfg.primaryColor || "#c9a84c";
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:"linear-gradient(135deg,#0a3a18,#041008)",border:`${size>60?3:2}px solid ${gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.45,overflow:"hidden",boxShadow:glow?`0 0 ${Math.round(size*.6)}px ${gold}44,inset 0 0 ${Math.round(size*.3)}px rgba(0,0,0,.5)`:"none",animation:glow?"glowPulse 3.5s ease infinite":"none",flexShrink:0}}>
      {url?<img src={url} alt="logo" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>:emoji}
    </div>
  );
}

function AcademyName({L,className="",style={}}){
  const cfg = getSiteCfg();
  const name = L==="en"?(cfg.academyNameEn||"Muknoon Academy"):(cfg.academyNameAr||"أكاديمية مكنون");
  return <span className={className} style={style}>{name}</span>;
}

// ─────────────────────────── EMAIL SYSTEM ────────────────────────────────────
// Simulated email system — in production connect to EmailJS / SendGrid / Mailgun
const EmailService = {
  send: async ({to, subject, body, lang}) => {
    // Simulate API call delay
    await new Promise(r=>setTimeout(r,800));
    // Log to console for demo — replace with real API in production
    console.log(`📧 EMAIL SENT\nTo: ${to}\nSubject: ${subject}\nBody: ${body}`);
    // Store in email log
    const log = JSON.parse(localStorage.getItem("muk_emails")||"[]");
    log.unshift({id:Date.now(),to,subject,body,lang,time:Date.now(),status:"sent"});
    localStorage.setItem("muk_emails",JSON.stringify(log.slice(0,100)));
    return {success:true};
  },
  sendBulk: async (recipients, subject, body, lang) => {
    for(const r of recipients){
      await EmailService.send({to:r,subject,body,lang});
    }
    return {success:true,count:recipients.length};
  },
  getLogs: () => JSON.parse(localStorage.getItem("muk_emails")||"[]"),
};

// OTP Utilities
const OTPStore = {
  save: (email, code) => {
    const expires = Date.now() + 10 * 60 * 1000; // 10 minutes
    localStorage.setItem("muk_otp_"+email, JSON.stringify({code, expires}));
  },
  verify: (email, code) => {
    try {
      const raw = localStorage.getItem("muk_otp_"+email);
      if (!raw) return {ok:false, reason:"no_otp"};
      const {code:saved, expires} = JSON.parse(raw);
      if (Date.now() > expires) return {ok:false, reason:"expired"};
      if (String(saved) !== String(code)) return {ok:false, reason:"wrong"};
      localStorage.removeItem("muk_otp_"+email);
      return {ok:true};
    } catch { return {ok:false, reason:"error"}; }
  },
  clear: (email) => localStorage.removeItem("muk_otp_"+email),
};

const generateOTP = () => Math.floor(100000 + Math.random() * 900000).toString();

const sendOTPEmail = async (email, name, code, L) => {
  // ── DEMO MODE (no keys yet) ─────────────────────────────────────────
  if (!EMAILJS_CONFIG.enabled) {
    console.log(`📧 OTP for ${email}: ${code}`);
    // Store for demo verification
    OTPStore.save(email, code);
    return {success: true, demo: true};
  }

  // ── PRODUCTION MODE (EmailJS) ───────────────────────────────────────
  try {
    OTPStore.save(email, code);
    const payload = {
      service_id:  EMAILJS_CONFIG.serviceId,
      template_id: EMAILJS_CONFIG.templateId,
      user_id:     EMAILJS_CONFIG.publicKey,
      template_params: {
        to_email:    email,
        to_name:     name,
        otp_code:    code,
        academy_name: "Muknoon Academy / أكاديمية مكنون",
        expires_in:  "10",
        subject:     L==="ar"
          ? `${code} — كود التحقق من أكاديمية مكنون`
          : `${code} — Muknoon Academy Verification Code`,
      },
    };
    const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload),
    });
    return {success: res.ok, demo: false};
  } catch (e) {
    console.error("EmailJS error:", e);
    return {success: false, demo: false};
  }
};

function NotifPanel({notifs,userId,markRead,onClose,L}){
  const mine=notifs.filter(n=>n.to==="all"||n.to===userId).slice(0,20);
  const unread=mine.filter(n=>!n.readBy?.includes(userId)).length;
  return(
    <div style={{position:"absolute",top:60,[L==="ar"?"left":"right"]:0,width:340,background:T.panel,border:`1px solid ${T.borderG}`,borderRadius:18,zIndex:700,boxShadow:`0 20px 60px rgba(0,0,0,.85)`,overflow:"hidden",animation:"fadeIn .2s ease"}}>
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:T.gold,fontWeight:800,fontSize:14}}>🔔 {t(L,"notifs")} {unread>0&&`(${unread})`}</span>
        {unread>0&&<button onClick={()=>mine.forEach(n=>markRead(n.id))} style={{background:"none",border:"none",color:T.muted,fontSize:11,cursor:"pointer"}}>{t(L,"markRead")}</button>}
      </div>
      <div style={{maxHeight:340,overflowY:"auto"}}>
        {mine.length===0?<div style={{padding:28,textAlign:"center",color:T.muted,fontSize:13}}>{t(L,"noNotifs")}</div>
        :mine.map(n=>{
          const read=n.readBy?.includes(userId);
          const title=L==="en"&&n.titleEn?n.titleEn:n.title;
          const body=L==="en"&&n.bodyEn?n.bodyEn:n.body;
          return(
            <div key={n.id} onClick={()=>markRead(n.id)} style={{padding:"12px 18px",borderBottom:`1px solid ${T.border}0a`,background:read?"transparent":"rgba(201,168,76,.03)",cursor:"pointer",display:"flex",gap:10,transition:"background .2s"}}

              <span style={{fontSize:16,flexShrink:0}}>{TICONS[n.type]||"📌"}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <span style={{color:T.text,fontSize:13,fontWeight:read?400:700}}>{title}</span>
                  {!read&&<span style={{width:7,height:7,borderRadius:"50%",background:T.gold,flexShrink:0,marginTop:3}}/>}
                </div>
                <div style={{color:T.muted,fontSize:11,marginTop:2}}>{body}</div>
                <div style={{color:T.muted,fontSize:10,marginTop:3}}>{ago(n.time,L)}</div>

            </div>
          );

  );
}

function QiraatSelector({value, onChange, L}){
  // value is now an ARRAY of selections: [{type,riwaya/program/matn,...}, ...]
  const selections = Array.isArray(value) ? value : (value ? [value] : []);
  const [tab, setTab] = useState("individual");
  const [selectedImam, setSelectedImam] = useState(null);

  const tabs = [
    {id:"individual", label:L==="ar"?"القراءات المفردة":"Individual Readings",      icon:"📿"},
    {id:"jam3",       label:L==="ar"?"برامج الجمع والإجازات":"Jam' & Ijaza Programs",icon:"📚"},
    {id:"mutoon",     label:L==="ar"?"المتون":"Texts (Mutoon)",                     icon:"📖"},
  ];

  // Check if an id is already selected
  const isSelected = id => selections.some(s=>s.riwaya===id||s.program===id||s.matn===id);

  // Toggle a selection on/off
  const toggleItem = (item) => {
    const id = item.riwaya||item.program||item.matn;
    if(isSelected(id)){
      // Remove it
      onChange(selections.filter(s=>(s.riwaya||s.program||s.matn)!==id));
    } else {

      onChange([...selections, item]);

    <div style={{background:T.bg,borderRadius:16,border:`1px solid ${T.borderG}`,overflow:"hidden"}}>

            flex:1,background:tab===tb.id?`${T.gold}12`:T.panel,
            border:"none",borderBottom:`2px solid ${tab===tb.id?T.gold:"transparent"}`,

            <span>{tb.label}</span>

//  OTP VERIFICATION SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function OTPScreen({email, name, onVerified, onBack, L}){
  const [digits, setDigits] = useState(["","","","","",""]);
  const [err, setErr]       = useState("");
  const [sending, setSending] = useState(false);
  const [sent, setSent]     = useState(false);
  const [timeLeft, setTimeLeft] = useState(600); // 10 min
  const [resendLeft, setResendLeft] = useState(30); // 30s cooldown
  const [canResend, setCanResend]   = useState(false);
  const inputRefs = Array.from({length:6}, ()=>useRef(null));

  // Send OTP on mount
  useEffect(()=>{ doSend(); },[]);

  // Countdown timers
  useEffect(()=>{
    const t = setInterval(()=>{
      setTimeLeft(p=>{ if(p<=1){ clearInterval(t); return 0; } return p-1; });
    },1000);
    return ()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    if(canResend) return;
    const t = setInterval(()=>{
      setResendLeft(p=>{ if(p<=1){ clearInterval(t); setCanResend(true); return 0; } return p-1; });
    },1000);
    return ()=>clearInterval(t);
  },[canResend]);

  const doSend = async()=>{
    setSending(true); setErr("");
    const code = generateOTP();
    const result = await sendOTPEmail(email, name, code, L);
    setSending(false); setSent(true);
    if(result.demo){
      // Show code on screen in demo mode
      setErr(L==="ar"
        ? `🔧 وضع تجريبي — الكود: ${code} (سيُرسَل فعلياً بعد ربط EmailJS)`
        : `🔧 Demo mode — Code: ${code} (will be emailed after EmailJS setup)`
      );
    }
  };

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const handleDigit = (i, val)=>{
    if(!/^\d*$/.test(val)) return;
    const next = [...digits];
    next[i] = val.slice(-1);
    setDigits(next);
    setErr("");
    if(val && i<5) inputRefs[i+1].current?.focus();
    // Auto-verify when all 6 filled
    if(next.every(d=>d) && val){
      verify(next.join(""));
    }
  };

  const handleKey = (i, e)=>{
    if(e.key==="Backspace" && !digits[i] && i>0){
      inputRefs[i-1].current?.focus();
    }
    if(e.key==="ArrowLeft" && i>0) inputRefs[i-1].current?.focus();
    if(e.key==="ArrowRight" && i<5) inputRefs[i+1].current?.focus();
  };

  const handlePaste = (e)=>{
    const pasted = e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    if(pasted.length===6){
      setDigits(pasted.split(""));
      verify(pasted);
    }
  };

  const verify = (code)=>{
    if(timeLeft===0){
      setErr(L==="ar"?"انتهت صلاحية الكود — اطلب كوداً جديداً":"Code expired — request a new one");
      return;
    }
    const result = OTPStore.verify(email, code);
    if(result.ok){
      onVerified();
    } else {
      const msg = result.reason==="expired"
        ? (L==="ar"?"انتهت صلاحية الكود":"Code expired")
        : (L==="ar"?"الكود غير صحيح — تحقق وأعد المحاولة":"Incorrect code — check and try again");
      setErr(msg);
      setDigits(["","","","","",""]);
      inputRefs[0].current?.focus();
    }
  };

  const resend = ()=>{
    setDigits(["","","","","",""]);
    setErr(""); setCanResend(false); setResendLeft(30); setTimeLeft(600);
    doSend();
    inputRefs[0].current?.focus();
  };

  const code = digits.join("");

  return(
    <div dir={LANG[L].dir} style={{minHeight:"100vh",background:BG,backgroundImage:PAT,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:LANG[L].font}}>
      <div style={{background:`linear-gradient(160deg,${T.panel},${T.bg2})`,border:`1px solid ${T.borderG}`,borderRadius:24,padding:40,width:"90%",maxWidth:440,textAlign:"center",boxShadow:`0 30px 100px rgba(0,0,0,.9)`,animation:"fadeUp .5s ease"}}>

        {/* Logo */}
        <div style={{margin:"0 auto 16px",display:"flex",justifyContent:"center"}}><LogoCircle size={64}/></div>
        <div className="sh" style={{fontFamily:"'Amiri',serif",fontSize:22,fontWeight:700,marginBottom:6,display:"block"}}>
          {L==="ar"?"التحقق من البريد الإلكتروني":"Email Verification"}
        </div>

        {/* Email icon animation */}
        <div style={{fontSize:52,margin:"12px 0",animation:"breathe 2.5s ease infinite"}}>📧</div>

        <div style={{color:T.textD,fontSize:13,lineHeight:1.8,marginBottom:6}}>
          {L==="ar"
            ? <>تم إرسال كود التحقق إلى<br/><span style={{color:T.gold,fontWeight:700}}>{email}</span></>
            : <>Verification code sent to<br/><span style={{color:T.gold,fontWeight:700}}>{email}</span></>
          }
        </div>

        {/* Timer */}
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:timeLeft>60?`${T.green}15`:`${T.red}15`,border:`1px solid ${timeLeft>60?T.green:T.red}44`,borderRadius:10,padding:"6px 16px",marginBottom:20}}>
          <span style={{fontSize:14}}>⏱</span>
          <span style={{color:timeLeft>60?T.greenL:T.redL,fontFamily:"monospace",fontWeight:800,fontSize:16}}>{fmt(timeLeft)}</span>
          <span style={{color:T.muted,fontSize:11}}>{L==="ar"?"دقائق":"min"}</span>
        </div>

        {/* OTP Input boxes */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20,direction:"ltr"}} onPaste={handlePaste}>
          {digits.map((d,i)=>(
            <input key={i} ref={inputRefs[i]} value={d} onChange={e=>handleDigit(i,e.target.value)} onKeyDown={e=>handleKey(i,e)}
              inputMode="numeric" maxLength={1} style={{
                width:48,height:58,borderRadius:12,textAlign:"center",fontSize:24,fontWeight:800,
                background:d?`${T.gold}15`:T.bg,
                border:`2px solid ${d?T.gold:err&&!d?T.red:T.border}`,
                color:d?T.gold:T.text,fontFamily:"monospace",
                outline:"none",transition:"all .2s",cursor:"text",
                boxShadow:d?`0 0 12px ${T.gold}33`:"none",
              }}/>
          ))}
        </div>

        {/* Error / Demo code display */}
        {err&&(
          <div style={{background:err.includes("🔧")?`${T.blue}15`:T.redBg,border:`1px solid ${err.includes("🔧")?T.blueL:T.red}44`,borderRadius:10,padding:"10px 14px",color:err.includes("🔧")?T.blueL:T.redL,fontSize:12,marginBottom:14,lineHeight:1.6,textAlign:"center"}}>
            {err}
          </div>
        )}

        {/* Verify button */}
        <GBtn full onClick={()=>verify(code)} dis={code.length<6||sending||timeLeft===0}>
          {sending
            ? <span style={{animation:"pulse 1s ease infinite"}}>{L==="ar"?"جارٍ الإرسال...":"Sending..."}</span>
            : `✅ ${L==="ar"?"تحقق من الكود":"Verify Code"}`
          }
        </GBtn>

        {/* Resend */}
        <div style={{marginTop:16,color:T.muted,fontSize:13}}>
          {L==="ar"?"لم يصلك الكود؟":"Didn't receive the code?"}
          {canResend
            ? <button onClick={resend} style={{background:"none",border:"none",color:T.gold,cursor:"pointer",fontSize:13,fontFamily:"inherit",marginRight:6,fontWeight:700}}>
                {L==="ar"?"إعادة الإرسال":"Resend"}
              </button>
            : <span style={{color:T.muted,marginRight:6}}> {L==="ar"?"انتظر":"Wait"} {resendLeft}s</span>
          }
        </div>

        {/* Back */}
        <button onClick={onBack} style={{marginTop:12,background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit",textDecoration:"underline"}}>
          {L==="ar"?"← تغيير البريد الإلكتروني":"← Change email"}
        </button>

        {/* Progress dots */}
        <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:20}}>
          {digits.map((d,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:"50%",background:d?T.gold:T.border,transition:"background .2s",boxShadow:d?`0 0 6px ${T.gold}`:undefined}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

const REG_STEPS_AR=["اختيار الباقة","البيانات الشخصية","اختيار المعلم","تأكيد التسجيل"];
const REG_STEPS_EN=["Choose Package","Personal Info","Choose Teacher","Confirm"];

function Register({db,onBack,onSubmit,onAutoLogin,L}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:"",age:"",gender:"male",phone:"",dialCode:"+966",country:"SA",parentName:"",email:"",level:"beginner",memorized:"",un:"",pw:"",pw2:"",packageId:1,teacherId:"",notes:"",qiraatTrack:[]});
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);
  const [showOTP,setShowOTP]=useState(false);
  const [otpVerified,setOtpVerified]=useState(false);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const ff=v=>setForm(p=>({...p,...v}));

  const teachers=db.users.filter(u=>u.role==="teacher"&&u.available);
  const packages=db.packages||[];
  const steps=L==="ar"?REG_STEPS_AR:REG_STEPS_EN;

  const validate=()=>{
    if(step===1){
      if(!form.name)return setErr(L==="ar"?"أدخل اسمك الكامل":"Enter your full name"),false;
      if(!form.phone)return setErr(L==="ar"?"أدخل رقم الهاتف":"Enter phone number"),false;
      if(!form.email||!form.email.includes("@"))return setErr(L==="ar"?"أدخل بريداً إلكترونياً صحيحاً":"Enter a valid email"),false;
      if(!form.un)return setErr(L==="ar"?"اختر اسم مستخدم":"Choose a username"),false;
      if(form.pw.length<4)return setErr(t(L,"minPassword")),false;
      if(form.pw!==form.pw2)return setErr(L==="ar"?"كلمتا المرور غير متطابقتان":"Passwords don't match"),false;
      if(db.users.find(u=>u.un===form.un))return setErr(L==="ar"?"اسم المستخدم محجوز":"Username taken"),false;
    }
    if(step===2&&!form.teacherId)return setErr(L==="ar"?"اختر معلماً":"Choose a teacher"),false;
    return true;
  };

  const next=()=>{setErr("");if(!validate())return;if(step<3)setStep(s=>s+1);else submit();};

  const submit=()=>{
    // Show OTP verification before finalizing registration
    setShowOTP(true);
  };

  const finalizeReg=()=>{
    const pkg=packages.find(p=>p.id===Number(form.packageId));
    const req={id:Date.now(),type:"reg_request",role:"pending_student",status:"pending",submittedAt:Date.now(),
      name:form.name,nameEn:form.name,age:Number(form.age),gender:form.gender,phone:form.phone,dialCode:form.dialCode,country:form.country,
      parentName:form.parentName,email:form.email,level:form.level,memorized:form.memorized,
      un:form.un,pw:form.pw,packageId:Number(form.packageId),teacherId:Number(form.teacherId),
      notes:form.notes,sessionsLeft:pkg?.sessions||0,qiraatTrack:form.qiraatTrack,lang:L,
    };
    onSubmit(req);
    setDone(true);
  };

  const LogoH=()=>(
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><LogoCircle size={58}/></div>
      <AcademyName L={L} className="sh" style={{fontFamily:"'Amiri',serif",fontSize:20,fontWeight:700,display:"block",textAlign:"center"}}/>
      <div style={{color:T.muted,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginTop:2}}>{L==="ar"?"تسجيل طالب جديد":"New Student Registration"}</div>
    </div>
  );

  // Show OTP verification screen
  if(showOTP && !done) return(
    <OTPScreen
      email={form.email}
      name={form.name}
      L={L}
      onVerified={()=>{setShowOTP(false);setOtpVerified(true);finalizeReg();}}
      onBack={()=>setShowOTP(false)}
    />
  );

  if(done) return(
    <div dir={LANG[L].dir} style={{minHeight:"100vh",background:BG,backgroundImage:PAT,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:LANG[L].font}}>
      <div style={{background:`linear-gradient(160deg,${T.panel},${T.bg2})`,border:`1px solid ${T.borderG}`,borderRadius:24,padding:40,width:"90%",maxWidth:440,textAlign:"center",boxShadow:`0 30px 100px rgba(0,0,0,.9)`,animation:"fadeUp .5s ease"}}>
        <div style={{fontSize:60,marginBottom:14,animation:"breathe 2s ease infinite"}}>🎉</div>
        <div className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:8}}>{t(L,"regSuccess")}</div>
        {/* Verified badge */}
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${T.green}15`,border:`1px solid ${T.green}44`,borderRadius:12,padding:"8px 18px",marginBottom:12}}>
          <span style={{fontSize:16}}>✅</span>
          <span style={{color:T.greenL,fontWeight:700,fontSize:13}}>{L==="ar"?"تم التحقق من البريد الإلكتروني":"Email Verified"}</span>
        </div>
        <div style={{color:T.textD,fontSize:13,lineHeight:1.9,marginBottom:18}}>{t(L,"regMsg")}</div>
        <div style={{background:T.bg,borderRadius:12,padding:14,marginBottom:18,border:`1px solid ${T.border}`}}>
          {[
            [L==="ar"?"📦 الباقة":"📦 Package", packages.find(p=>p.id===Number(form.packageId))?.[L==="en"?"nameEn":"name"]],
            [L==="ar"?"👨‍🏫 المعلم":"👨‍🏫 Teacher", getName(teachers.find(t=>t.id===Number(form.teacherId)),L)],
            [L==="ar"?"🔑 اسم المستخدم":"🔑 Username", form.un],
            [L==="ar"?"📧 البريد الإلكتروني":"📧 Email", form.email],
          ].map(([k,v])=>v&&(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}22`}}>
              <span style={{color:T.muted,fontSize:12}}>{k}</span>
              <span style={{color:T.text,fontSize:12,fontWeight:700}}>{v}</span>
            </div>
          ))}
        </div>
        <GBtn full onClick={()=>onAutoLogin&&onAutoLogin({...form,id:Date.now(),role:"pending_student",status:"pending",submittedAt:Date.now(),packageId:Number(form.packageId),teacherId:Number(form.teacherId)})}>
          📲 {t(L,"enterNow")}
        </GBtn>
      </div>
    </div>
  );

  return(
    <div dir={LANG[L].dir} style={{minHeight:"100vh",background:BG,backgroundImage:PAT,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",padding:"20px 0",fontFamily:LANG[L].font}}>
      <div style={{background:`linear-gradient(160deg,${T.panel},${T.bg2})`,border:`1px solid ${T.borderG}`,borderRadius:22,padding:32,width:"92%",maxWidth:520,boxShadow:`0 30px 100px rgba(0,0,0,.9)`,animation:"fadeUp .5s ease",position:"relative",zIndex:1}}>
        <LogoH/>

        {/* Step bar */}
        <div style={{display:"flex",alignItems:"center",marginBottom:24}}>
          {steps.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",flex:1}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:i<step?T.green:i===step?T.gold:T.border,color:i===step?"#04060d":i<step?"#fff":T.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,transition:"all .3s",boxShadow:i===step?`0 0 10px ${T.gold}66`:undefined}}>{i<step?"✓":i+1}</div>
                <div style={{color:i===step?T.gold:T.muted,fontSize:9,marginTop:3,textAlign:"center",whiteSpace:"nowrap"}}>{s}</div>
              </div>
              {i<steps.length-1&&<div style={{height:2,flex:1,background:i<step?T.green:T.border,margin:"0 2px",marginBottom:14,transition:"background .3s"}}/>}
            </div>
          ))}
        </div>

        {/* Step 0: Package */}
        {step===0&&(
          <div>
            <div style={{color:T.textD,fontSize:13,textAlign:"center",marginBottom:16}}>{L==="ar"?"اختر الباقة المناسبة لك":"Choose the right package for you"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {packages.map(pkg=>{
                const sel=Number(form.packageId)===pkg.id;
                return(
                  <div key={pkg.id} onClick={()=>f("packageId")(pkg.id)} style={{background:sel?`${T.gold}12`:T.bg,border:`2px solid ${sel?T.gold:T.border}`,borderRadius:14,padding:14,cursor:"pointer",transition:"all .2s",position:"relative"}}>
                    {pkg.popular&&<div style={{position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",background:T.green,color:"#fff",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"}}>{L==="ar"?"الأكثر طلباً":"Most Popular"}</div>}
                    <div style={{fontSize:24,marginBottom:5}}>{pkg.icon}</div>
                    <div style={{color:T.text,fontWeight:700,fontSize:12,marginBottom:2}}>{L==="en"?pkg.nameEn:pkg.name}</div>
                    <div style={{color:sel?T.gold:T.muted,fontWeight:900,fontSize:18}}>{pkg.price===0?(L==="ar"?"مجاني":"Free"):"$"+pkg.price}</div>
                    <div style={{color:T.muted,fontSize:10,marginTop:2}}>{pkg.sessions} {L==="ar"?"حصة":"sessions"} · {pkg.duration} {L==="ar"?"يوم":"days"}</div>
                    {sel&&<div style={{position:"absolute",top:7,left:7,width:16,height:16,borderRadius:"50%",background:T.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#04060d",fontWeight:800}}>✓</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Step 1: Personal info */}
        {step===1&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Inp label={t(L,"fullName")+" *"} value={form.name} onChange={f("name")} ph={L==="ar"?"الاسم الكامل":"Full name"}/>
              <Inp label={t(L,"age")} value={form.age} onChange={f("age")} type="number" ph={L==="ar"?"السن":"Age"}/>
            </div>
            {/* Gender selector */}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",color:T.textD,fontSize:13,marginBottom:8,fontWeight:600}}>
                {L==="ar"?"الجنس *":"Gender *"}
              </label>
              <div style={{display:"flex",gap:10}}>
                {[
                  {v:"male",  arLabel:"👦 ذكر",   enLabel:"👦 Male"},
                  {v:"female",arLabel:"👧 أنثى",   enLabel:"👧 Female"},
                ].map(g=>(
                  <button key={g.v} onClick={()=>f("gender")(g.v)} style={{
                    flex:1, background:form.gender===g.v?`${T.gold}15`:T.bg,
                    border:`2px solid ${form.gender===g.v?T.gold:T.border}`,
                    borderRadius:12, padding:"12px 8px", cursor:"pointer",
                    color:form.gender===g.v?T.gold:T.text, fontWeight:form.gender===g.v?800:400,
                    fontSize:15, fontFamily:"inherit", transition:"all .2s", textAlign:"center",
                  }}>
                    {L==="ar"?g.arLabel:g.enLabel}
                  </button>
                ))}
              </div>
            </div>
            <CountryInp label={t(L,"country")+" *"} value={form.country} onChange={v=>{const c=COUNTRIES.find(x=>x.code===v);ff({country:v,dialCode:c?.dial||form.dialCode});}} L={L}/>
            <PhoneInp label={t(L,"phone")+" *"} dialCode={form.dialCode} onDialChange={f("dialCode")} phone={form.phone} onPhoneChange={f("phone")} L={L}/>
            <Inp label={t(L,"email")+" *"} value={form.email} onChange={f("email")} type="email" ph={L==="ar"?"بريدك الإلكتروني":"your@email.com"}/>
            <Inp label={t(L,"parentName")} value={form.parentName} onChange={f("parentName")} ph={L==="ar"?"للطلاب دون 18":"For students under 18"}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div>
                <label style={{display:"block",color:T.textD,fontSize:13,marginBottom:5,fontWeight:600}}>{t(L,"level")}</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {[
                    {v:"beginner",   l:L==="ar"?"🌱 مبتدئ":"🌱 Beginner"},
                    {v:"intermediate",l:L==="ar"?"📘 متوسط":"📘 Intermediate"},
                    {v:"advanced",   l:L==="ar"?"🎓 متقدم":"🎓 Advanced"},
                    {v:"ijaza",      l:L==="ar"?"🏆 الإجازة القرآنية":"🏆 Quranic Ijaza"},
                  ].map(opt=>(
                    <button key={opt.v} onClick={()=>{f("level")(opt.v);if(opt.v!=="ijaza")f("qiraatTrack")([]);}} style={{
                      background:form.level===opt.v?`${T.gold}15`:T.bg,
                      border:`2px solid ${form.level===opt.v?T.gold:T.border}`,
                      borderRadius:10,padding:"9px 8px",cursor:"pointer",
                      color:form.level===opt.v?T.gold:T.text,fontSize:11,fontWeight:form.level===opt.v?800:400,
                      fontFamily:"inherit",transition:"all .2s",textAlign:"center",
                    }}>{opt.l}</button>
                  ))}
                </div>
              </div>
              <Inp label={t(L,"memorized")} value={form.memorized} onChange={f("memorized")} ph={L==="ar"?"مثال: جزء عم":"e.g. Juz Amma"}/>
            </div>
            {form.level==="ijaza"&&(
              <div style={{marginTop:4}}>
                <QiraatSelector value={form.qiraatTrack} onChange={v=>f("qiraatTrack")(v)} L={L}/>
              </div>
            )}
            <Sep/>
            <div style={{color:T.textD,fontSize:12,marginBottom:10}}>🔐 {t(L,"loginCredentials")}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Inp label={t(L,"username")+" *"} value={form.un} onChange={f("un")} ph={t(L,"usernameHint")}/>
              <Inp label={t(L,"password")+" *"} value={form.pw} onChange={f("pw")} type="password" ph="4+ chars"/>
            </div>
            <Inp label={t(L,"confirmPassword")+" *"} value={form.pw2} onChange={f("pw2")} type="password" ph="••••••••"/>
          </div>
        )}

        {/* Step 2: Choose teacher */}
        {step===2&&(
          <div>
            <div style={{color:T.textD,fontSize:13,textAlign:"center",marginBottom:14}}>{L==="ar"?"اختر معلمك":"Choose your teacher"}</div>
            <div style={{display:"grid",gap:10,maxHeight:290,overflowY:"auto",paddingLeft:4}}>
              {teachers.map(tc=>{
                const sel=Number(form.teacherId)===tc.id;
                const ctry=COUNTRIES.find(c=>c.code===tc.country);
                return(
                  <div key={tc.id} onClick={()=>f("teacherId")(tc.id)} style={{display:"flex",gap:12,alignItems:"center",background:sel?`${T.gold}10`:T.bg,border:`2px solid ${sel?T.gold:T.border}`,borderRadius:14,padding:14,cursor:"pointer",transition:"all .2s"}}>
                    <Av n={getName(tc,L)} s={44} gold={sel}/>
                    <div style={{flex:1}}>
                      <div style={{color:T.text,fontWeight:800,fontSize:13}}>{getName(tc,L)}</div>
                      <div style={{color:T.gold,fontSize:12}}>{L==="en"&&tc.specialtyEn?tc.specialtyEn:tc.specialty}</div>
                      <div style={{color:T.muted,fontSize:11,marginTop:1}}>{L==="en"&&tc.bioEn?tc.bioEn?.slice(0,50):tc.bio?.slice(0,50)}...</div>
                      <div style={{display:"flex",gap:8,alignItems:"center",marginTop:3}}>
                        <span style={{color:"#f59e0b",fontSize:11}}>{"★".repeat(Math.round(tc.rating||5))} {tc.rating}</span>
                        {ctry&&<span style={{color:T.muted,fontSize:11}}>{ctry.flag} {L==="ar"?ctry.ar:ctry.en}</span>}
                      </div>
                    </div>
                    {sel&&<div style={{width:20,height:20,borderRadius:"50%",background:T.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#04060d",fontWeight:800,flexShrink:0}}>✓</div>}
                  </div>
                );
              })}
              {!teachers.length&&<div style={{textAlign:"center",color:T.muted,padding:"20px 0"}}>{L==="ar"?"لا يوجد معلمون متاحون":"No teachers available"}</div>}
            </div>
            <div style={{marginTop:12}}>
              <Inp label={t(L,"noteToAdmin")} value={form.notes} onChange={f("notes")} rows={2} ph={L==="ar"?"أي طلب أو استفسار...":"Any request or question..."}/>
            </div>
          </div>
        )}

        {/* Step 3: Confirm */}
        {step===3&&(
          <div>
            <div style={{color:T.textD,fontSize:13,textAlign:"center",marginBottom:14}}>{L==="ar"?"راجع بياناتك قبل الإرسال":"Review your details before submitting"}</div>
            <div style={{background:T.bg,borderRadius:14,padding:14,border:`1px solid ${T.border}`,marginBottom:12}}>
              {[
                [L==="ar"?"👤 الاسم":"👤 Name",form.name],
                [L==="ar"?"🌍 الدولة":"🌍 Country",COUNTRIES.find(c=>c.code===form.country)?.[L==="ar"?"ar":"en"]],
                [L==="ar"?"📞 الهاتف":"📞 Phone",`${form.dialCode} ${form.phone}`],
                [L==="ar"?"📧 البريد":"📧 Email",form.email],
                [L==="ar"?"⚧ الجنس":"⚧ Gender", form.gender==="male"?(L==="ar"?"👦 ذكر":"👦 Male"):(L==="ar"?"👧 أنثى":"👧 Female")],
                [L==="ar"?"📊 المستوى":"📊 Level",form.level==="ijaza"?(L==="ar"?"🏆 الإجازة القرآنية":"🏆 Quranic Ijaza"):t(L,form.level)],
                ...(form.qiraatTrack&&form.qiraatTrack.length>0?[[L==="ar"?"📿 المسارات المختارة":"📿 Selected Tracks",
                  form.qiraatTrack.map(s=>s.type==="individual"?(L==="ar"?s.riwayaName:s.riwayaNameEn):s.type==="jam3"?(L==="ar"?s.programName:s.programNameEn):(L==="ar"?s.matnName:s.matnNameEn)).join(" · ")]]:
                []),
                [L==="ar"?"📦 الباقة":"📦 Package",packages.find(p=>p.id===Number(form.packageId))?.[L==="en"?"nameEn":"name"]],
                [L==="ar"?"👨‍🏫 المعلم":"👨‍🏫 Teacher",getName(teachers.find(tc=>tc.id===Number(form.teacherId)),L)],
                [L==="ar"?"🔑 اسم المستخدم":"🔑 Username",form.un],
              ].filter(([,v])=>v).map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${T.border}22`}}>
                  <span style={{color:T.muted,fontSize:12}}>{k}</span>
                  <span style={{color:T.text,fontSize:12,fontWeight:700}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{background:"#0a1f0a",border:`1px solid ${T.green}33`,borderRadius:12,padding:"12px 14px",marginBottom:12}}>
              <div style={{color:T.greenL,fontSize:12,fontWeight:700,marginBottom:6}}>
                📧 {L==="ar"?"سيُرسَل كود التحقق إلى:":"A verification code will be sent to:"}
              </div>
              <div style={{color:T.gold,fontSize:14,fontWeight:700,marginBottom:4}}>{form.email}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginTop:4}}>
                <span style={{fontSize:12}}>⏱</span>
                <span style={{color:T.muted,fontSize:11}}>{L==="ar"?"الكود صالح لمدة 10 دقائق":"Code valid for 10 minutes"}</span>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginTop:3}}>
                <span style={{fontSize:12}}>🔢</span>
                <span style={{color:T.muted,fontSize:11}}>{L==="ar"?"6 أرقام — أدخله في الشاشة التالية":"6 digits — enter it on the next screen"}</span>
              </div>
            </div>
          </div>
        )}

        {err&&<div style={{background:T.redBg,border:`1px solid ${T.red}44`,borderRadius:10,padding:"10px 14px",color:T.redL,fontSize:13,marginBottom:12,textAlign:"center"}}>⚠️ {err}</div>}

        <div style={{display:"flex",gap:10,marginTop:4}}>
          {step>0?<GBtn ghost onClick={()=>{setErr("");setStep(s=>s-1);}}>{L==="ar"?"← السابق":"← Back"}</GBtn>:<GBtn ghost onClick={onBack}>{L==="ar"?"← تسجيل الدخول":"← Login"}</GBtn>}
          <GBtn full onClick={next}>{step===3?`✅ ${t(L,"submit")}`:`${t(L,"next")} →`}</GBtn>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────── PENDING PAGE ────────────────────────────────────
function PendingPage({req,db,onLogout,L}){
  const teacher=db.users.find(u=>u.id===Number(req.teacherId));
  const pkg=db.packages?.find(p=>p.id===Number(req.packageId));
  const live=db.regRequests?.find(r=>r.id===req.id)||req;
  const status=live.status||"pending";
  const map={
    pending:{icon:"⏳",c:T.gold,  label:t(L,"pending"),  msg:t(L,"pendingMsg"), bg:"#1a1204",br:`${T.gold}44`},
    approved:{icon:"✅",c:T.greenL,label:t(L,"approved"), msg:t(L,"approvedMsg"),bg:"#0a1f0a",br:`${T.green}44`},
    rejected:{icon:"❌",c:T.redL,  label:t(L,"rejected"), msg:t(L,"rejectedMsg"),bg:"#1a0808",br:`${T.red}44`},
  };
  const st=map[status]||map.pending;
  return(
    <div dir={LANG[L].dir} style={{minHeight:"100vh",background:BG,backgroundImage:PAT,fontFamily:LANG[L].font,color:T.text}}>
      <style>{CSS}</style>
      <header style={{background:`${T.panel}f2`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${T.border}`,padding:"0 20px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <LogoCircle size={34} glow={false}/>
          <AcademyName L={L} className="sh" style={{fontFamily:"'Amiri',serif",fontSize:14,fontWeight:700}}/>
        </div>
        <GBtn ghost sm onClick={onLogout}>{t(L,"logout")} ↩</GBtn>
      </header>
      <div style={{maxWidth:580,margin:"32px auto",padding:"0 16px"}}>
        <div style={{background:`linear-gradient(135deg,${st.bg},${T.panel})`,border:`1px solid ${st.br}`,borderRadius:20,padding:28,textAlign:"center",marginBottom:18,animation:"fadeUp .5s ease"}}>
          <div style={{fontSize:60,marginBottom:12,animation:"breathe 2.5s ease infinite"}}>{st.icon}</div>
          <div style={{color:st.c,fontWeight:900,fontSize:22,marginBottom:6}}>{st.label}</div>
          <div style={{color:T.textD,fontSize:14,lineHeight:1.8}}>{st.msg}</div>
          {status==="pending"&&<div style={{marginTop:14,display:"inline-flex",alignItems:"center",gap:8,background:`${T.gold}12`,border:`1px solid ${T.gold}33`,borderRadius:12,padding:"8px 18px"}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:T.gold,animation:"pulse 1.5s ease infinite",display:"inline-block"}}/>
            <span style={{color:T.gold,fontSize:12}}>{L==="ar"?"في انتظار مراجعة المشرف...":"Awaiting admin review..."}</span>
          </div>}
        </div>

        <Card style={{marginBottom:14}}>
          <div style={{color:T.gold,fontWeight:800,fontSize:14,marginBottom:12}}>📋 {t(L,"myRequest")}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              [L==="ar"?"👤 الاسم":"👤 Name",req.name],
              [L==="ar"?"📊 المستوى":"📊 Level",req.level==="ijaza"?(L==="ar"?"🏆 الإجازة القرآنية":"🏆 Quranic Ijaza"):t(L,req.level||"beginner")],
              ...(req.qiraatTrack&&req.qiraatTrack.length>0?[[L==="ar"?"📿 المسارات القرآنية":"📿 Quranic Tracks",
                (Array.isArray(req.qiraatTrack)?req.qiraatTrack:[req.qiraatTrack]).map(s=>s.type==="individual"?(L==="ar"?s.riwayaName:s.riwayaNameEn):s.type==="jam3"?(L==="ar"?s.programName:s.programNameEn):(L==="ar"?s.matnName:s.matnNameEn)).join(" · ")]]:
              []),
              [L==="ar"?"🌍 الدولة":"🌍 Country",COUNTRIES.find(c=>c.code===req.country)?.[L==="ar"?"ar":"en"]||"—"],
              [L==="ar"?"📞 الهاتف":"📞 Phone",`${req.dialCode||""} ${req.phone||"—"}`],
              [L==="ar"?"📧 البريد":"📧 Email",req.email||"—"],
              [L==="ar"?"📦 الباقة":"📦 Package",(L==="en"?pkg?.nameEn:pkg?.name)||"—"],
            ].map(([k,v])=>(
              <div key={k} style={{background:T.bg,borderRadius:10,padding:"10px 12px"}}>
                <div style={{color:T.muted,fontSize:10,marginBottom:2}}>{k}</div>
                <div style={{color:T.text,fontSize:12,fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>
        </Card>

        {teacher&&<Card style={{marginBottom:14}}>
          <div style={{color:T.gold,fontWeight:800,fontSize:14,marginBottom:12}}>👨‍🏫 {t(L,"chosenTeacher")}</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <Av n={getName(teacher,L)} s={50} gold/>
            <div>
              <div style={{color:T.text,fontWeight:800,fontSize:15}}>{getName(teacher,L)}</div>
              <div style={{color:T.gold,fontSize:12}}>{L==="en"&&teacher.specialtyEn?teacher.specialtyEn:teacher.specialty}</div>
              <div style={{color:"#f59e0b",fontSize:13,marginTop:3}}>{"★".repeat(Math.round(teacher.rating||5))} {teacher.rating}</div>
            </div>
          </div>
        </Card>}

        <Card style={{background:`linear-gradient(135deg,${T.card},#080f1a)`,border:`1px solid ${T.gold}22`}}>
          <div style={{color:T.gold,fontWeight:800,fontSize:13,marginBottom:12}}>📌 {t(L,"whatsNext")}</div>
          {[[L==="ar"?"المراجعة":"Review",L==="ar"?"المشرف سيراجع طلبك":"Admin will review your request",T.gold],
            [L==="ar"?"الإشعار":"Notification",L==="ar"?"ستصلك رسالة بريد إلكتروني عند القبول":"You'll receive an email when approved",T.greenL],
            [L==="ar"?"الدخول الكامل":"Full Access",L==="ar"?"ستتمكن من حجز حصصك":"You can book sessions with your teacher",T.blueL],
          ].map(([tl,d,c],i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:`${c}22`,border:`1px solid ${c}44`,display:"flex",alignItems:"center",justifyContent:"center",color:c,fontSize:11,fontWeight:800,flexShrink:0}}>{i+1}</div>
              <div><div style={{color:T.text,fontSize:13,fontWeight:700}}>{tl}</div><div style={{color:T.muted,fontSize:11}}>{d}</div></div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// ─────────────────────────── HEADER ──────────────────────────────────────────
function Header({user,onLogout,notifs,markRead,navItems,page,setPage,L,onLangChange}){
  const [showN,setShowN]=useState(false);
  const unread=notifs.filter(n=>(n.to==="all"||n.to===user.id)&&!n.readBy?.includes(user.id)).length;
  const rc={admin:T.gold,teacher:T.greenL,student:T.blueL}[user.role]||T.muted;
  const rl={admin:t(L,"admin"),teacher:t(L,"teacher"),student:t(L,"student")}[user.role]||"";

// ─────────────────────────── EMAIL MODAL ─────────────────────────────────────
function EmailModal({db,onClose,addNotif,L}){
  const [to,setTo]=useState("all");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);

  const getRecipients=()=>{
    const users=db.users.filter(u=>u.email);
    if(to==="all") return users.map(u=>u.email);
    if(to==="teachers") return users.filter(u=>u.role==="teacher").map(u=>u.email);
    if(to==="students") return users.filter(u=>u.role==="student").map(u=>u.email);
    return [];
  };

  const send=async()=>{
    if(!subject||!body){addNotif({type:"warning",title:L==="ar"?"بيانات ناقصة":"Missing info",body:L==="ar"?"أدخل الموضوع والرسالة":"Enter subject and message"});return;}
    setSending(true);
    const recipients=getRecipients();
    await EmailService.sendBulk(recipients,subject,body,L);
    setSending(false);setSent(true);
    addNotif({type:"success",title:t(L,"emailSent"),body:`${L==="ar"?"تم الإرسال إلى":"Sent to"} ${recipients.length} ${L==="ar"?"مستلم":"recipients"}`});
    setTimeout(onClose,1500);
  };

  const toOpts=[
    {v:"all",l:t(L,"sendToAll")+" 👥"},
    {v:"teachers",l:t(L,"sendToTeachers")+" 👨‍🏫"},
    {v:"students",l:t(L,"sendToStudents")+" 👨‍🎓"},
  ];

  return(
    <Modal title={`📧 ${t(L,"emailSystem")}`} onClose={onClose} w={540}>
      {sent?<div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:48,marginBottom:10}}>✅</div>
        <div style={{color:T.greenL,fontWeight:700,fontSize:16}}>{t(L,"emailSent")}</div>
      </div>:<>
        <Inp label={t(L,"emailTo")} value={to} onChange={setTo} opts={toOpts}/>
        <div style={{background:T.bg,borderRadius:10,padding:"8px 12px",marginBottom:14,display:"flex",gap:8,alignItems:"center",border:`1px solid ${T.border}`}}>
          <span style={{fontSize:14}}>📧</span>
          <span style={{color:T.muted,fontSize:12}}>{L==="ar"?"سيُرسل إلى:":"Will be sent to:"} <span style={{color:T.gold,fontWeight:700}}>{getRecipients().join(", ")||"—"}</span></span>
        </div>
        <Inp label={t(L,"subject")} value={subject} onChange={setSubject} ph={L==="ar"?"موضوع البريد الإلكتروني":"Email subject"}/>
        <Inp label={t(L,"message")} value={body} onChange={setBody} rows={5} ph={L==="ar"?"نص الرسالة...":"Message body..."}/>
        <div style={{background:"#060c1a",border:`1px solid ${T.blue}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:T.muted}}>
          💡 {L==="ar"?"ملاحظة: هذا نظام محاكاة للبريد الإلكتروني. في الإنتاج اربطه بـ EmailJS أو SendGrid":"Note: This is a simulated email system. In production, connect to EmailJS or SendGrid."}
        </div>
        <GBtn full onClick={send} dis={sending}>{sending?<span style={{animation:"pulse 1s ease infinite"}}>⏳ {L==="ar"?"جارٍ الإرسال...":"Sending..."}</span>:`📧 ${t(L,"sendEmail")}`}</GBtn>
      </>}
    </Modal>
  );
}

    if(!bform.teacherId) return;

    <div>
      {bookModal&&<Modal title={`📅 ${t(L,"bookSession")}`} onClose={()=>setBookModal(false)}>
        <Inp label={t(L,"teacher")} value={bform.teacherId} onChange={bf("teacherId")} opts={[{v:"",l:L==="ar"?"اختر معلماً":"Choose teacher"},...availTeachers.map(tc=>({v:tc.id,l:`${getName(tc,L)} — ${L==="en"&&tc.specialtyEn?tc.specialtyEn:tc.specialty}`}))]}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={t(L,"day")} value={bform.day} onChange={v=>{setBform(p=>({...p,day:v,time:""}));}} opts={SDAYS.map((d,i)=>({v:d,l:d}))}/>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",color:T.textD,fontSize:13,marginBottom:5,fontWeight:600}}>{t(L,"time")}</label>
            {(()=>{
              const selTeacher = availTeachers.find(tc=>tc.id===Number(bform.teacherId));
              const selDayEn = WEEK_DAYS_EN[SDAYS.indexOf(bform.day)] || bform.day;
              const freeSlots = selTeacher ? getAvailableSlots(selTeacher, db.sessions, selDayEn) : [];
              if(!bform.teacherId) return <div style={{background:T.bg,borderRadius:10,padding:"10px 14px",color:T.muted,fontSize:13}}>{L==="ar"?"اختر المعلم أولاً":"Choose a teacher first"}</div>;
              if(!freeSlots.length) return <div style={{background:"#1a0808",borderRadius:10,padding:"10px 14px",color:T.redL,fontSize:13}}>⚠️ {L==="ar"?"لا توجد أوقات متاحة في هذا اليوم — اختر يوماً آخر":"No available slots on this day — choose another day"}</div>;
              return(
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {freeSlots.map(slot=>(
                    <button key={slot} onClick={()=>setBform(p=>({...p,time:slot}))} style={{background:bform.time===slot?`${T.gold}20`:T.bg,border:`2px solid ${bform.time===slot?T.gold:T.border}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",color:bform.time===slot?T.gold:T.text,fontWeight:bform.time===slot?800:400,fontSize:13,fontFamily:"inherit",transition:"all .2s"}}>
                      {slot}
                    </button>
                  ))}
                </div>
              );
            })()}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label={t(L,"duration")} value={bform.duration} onChange={bf("duration")} opts={["30","45","60","90","120"].map(v=>({v,l:`${v} ${t(L,"minutes")}`}))}/>
          <Inp label={t(L,"sessionType")} value={bform.type} onChange={bf("type")} opts={STYPES}/>
        </div>
        <Inp label={t(L,"meetingType")} value={bform.meetingType} onChange={bf("meetingType")} opts={[{v:"zoom",l:"🎥 Zoom"},{v:"meet",l:"📹 Google Meet"},{v:"custom",l:`🔗 ${t(L,"customLink")}`},{v:"room",l:`🎙 ${t(L,"builtInRoom")}`}]}/>
        <Inp label={t(L,"notes")} value={bform.notes} onChange={bf("notes")} rows={2} ph={L==="ar"?"ملاحظات للمعلم...":"Notes for teacher..."}/>
        <GBtn full onClick={book}>📅 {t(L,"bookSession")}</GBtn>
      </Modal>}

      {meetModal&&<MeetingRoom session={meetModal} student={me} teacher={db.users.find(u=>u.id===meetModal.teacherId)} currentUser={me} onClose={()=>setMeetModal(null)} L={L}/>}

      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:22}}>
        <Av n={getName(me,L)} s={56}/>
        <div style={{flex:1}}>
          <h1 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:26,fontWeight:700,marginBottom:2}}>{L==="ar"?"أهلاً,":"Hello,"} {getName(me,L)} 👋</h1>
          <div style={{color:T.muted,fontSize:13}}>﴿ وَرَتِّلِ الْقُرْآنَ تَرْتِيلًا ﴾</div>
        </div>
        <GBtn sm onClick={()=>setBookModal(true)}>+ {t(L,"bookSession")}</GBtn>
      </div>

      <Card style={{marginBottom:14,background:`linear-gradient(135deg,${T.card},${T.panel})`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{color:T.text,fontWeight:700,fontSize:14}}>📈 {t(L,"progress")}</div>
          <Bdg c={me.level==="advanced"?"green":me.level==="intermediate"?"gold":"blue"}>{t(L,me.level||"beginner")}</Bdg>
        </div>
        <div style={{position:"relative",background:T.bg,borderRadius:10,height:16,overflow:"hidden",marginBottom:8}}>
          <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(90deg,transparent,transparent 9%,rgba(255,255,255,.02) 9%,rgba(255,255,255,.02) 10%)"}}/>
          <div style={{width:`${me.progress||0}%`,height:"100%",background:`linear-gradient(90deg,${T.goldD},${T.gold},${T.goldL})`,borderRadius:10,boxShadow:`0 0 10px ${T.gold}44`,transition:"width 1.2s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{color:T.muted,fontSize:12}}>{me.memorized}</span>
          <span style={{color:T.gold,fontWeight:900,fontSize:18}}>{me.progress||0}%</span>
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:14}}>
        {[
          {icon:"📅",l:t(L,"sessions"),v:upcoming.length,c:T.blueL},
          {icon:"✅",l:t(L,"completed"),v:done.length,c:T.greenL},
          {icon:"📦",l:t(L,"package"),v:myPkg?.[L==="en"?"nameEn":"name"]||"—",c:T.gold,sm:true},
          {icon:"🔢",l:t(L,"sessionsLeft"),v:me.sessionsLeft||0,c:me.sessionsLeft>3?T.greenL:T.redL},
        ].map(s=>(
          <Card key={s.l} style={{textAlign:"center",padding:14}}>
            <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:s.sm?12:26,fontWeight:900,color:s.c,lineHeight:1,marginBottom:3}}>{s.v}</div>
            <div style={{color:T.muted,fontSize:10}}>{s.l}</div>
          </Card>
        ))}
      </div>

      {myTeacher&&<Card style={{marginBottom:14,background:`linear-gradient(135deg,${T.card},${T.panel})`}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <Av n={getName(myTeacher,L)} s={50} gold/>
          <div style={{flex:1}}>
            <div style={{color:T.textD,fontSize:11,marginBottom:2}}>{L==="ar"?"معلمي":"My Teacher"}</div>
            <div style={{color:T.text,fontWeight:800,fontSize:15}}>{getName(myTeacher,L)}</div>
            <div style={{color:T.gold,fontSize:12}}>{L==="en"&&myTeacher.specialtyEn?myTeacher.specialtyEn:myTeacher.specialty}</div>
          </div>
          <GBtn sm onClick={()=>setBookModal(true)}>📅 {t(L,"bookSession")}</GBtn>
        </div>
      </Card>}

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{color:T.text,fontWeight:700,fontSize:14}}>🗓 {L==="ar"?"مواعيدي القادمة":"Upcoming Sessions"}</div>
          <GBtn ghost sm onClick={()=>setPage("s-sessions")}>{L==="ar"?"عرض الكل":"View All"}</GBtn>
        </div>
        {upcoming.length===0?<div style={{textAlign:"center",color:T.muted,padding:"18px 0",fontSize:13}}>
          {L==="ar"?"لا توجد مواعيد —":"No sessions — "}
          <button onClick={()=>setBookModal(true)} style={{background:"none",border:"none",color:T.gold,cursor:"pointer",fontFamily:LANG[L].font,fontSize:13}}>
            {t(L,"bookSession")}
          </button>
        </div>:upcoming.slice(0,3).map(s=>{
          const tc=db.users.find(u=>u.id===s.teacherId);
          return <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:10,background:T.bg,borderRadius:12,marginBottom:8,border:`1px solid ${T.border}`}}>
            <div>
              <div style={{color:T.text,fontWeight:700,fontSize:13}}>{t(L,s.type)} · {s.day} {s.time}</div>
              <div style={{color:T.muted,fontSize:11,marginTop:2}}>{L==="ar"?"مع":"With"} {getName(tc,L)}</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <Bdg c={s.status==="confirmed"?"green":"gold"} dot sm>{t(L,s.status==="confirmed"?"confirmed":"awaiting")}</Bdg>
              {s.status==="confirmed"&&<GBtn sm onClick={()=>setMeetModal(s)}>🎙</GBtn>}
            </div>
          </div>;
        })}
      </Card>
    </div>
  );
}

// ─────────────────────────── TEACHER PORTAL ──────────────────────────────────
function TeacherPortal({user,db,setDb,addNotif,page,setPage,L}){
  const [meetModal,setMeetModal]=useState(null);
  const [linkModal,setLinkModal]=useState(false);
  const [links,setLinks]=useState({zoomLink:user.zoomLink||"",meetLink:user.meetLink||"",customLink:user.customLink||""});
  const me=db.users.find(u=>u.id===user.id)||user;
  const myStudents=db.users.filter(u=>u.role==="student"&&u.teacherId===me.id);
  const mySessions=db.sessions.filter(s=>s.teacherId===me.id);
  const pending=mySessions.filter(s=>s.status==="awaiting");
  const upcoming=mySessions.filter(s=>s.status==="confirmed");

  const approve=id=>{
    const s=db.sessions.find(x=>x.id===id);
    setDb(p=>({...p,sessions:p.sessions.map(x=>x.id===id?{...x,status:"confirmed"}:x)}));
    addNotif({to:s.studentId,type:"success",title:L==="ar"?"✅ تم تأكيد موعدك":"✅ Session Confirmed",body:`${t(L,s.type)} · ${s.day} ${s.time}`});
  };
  const reject=id=>{
    const s=db.sessions.find(x=>x.id===id);
    setDb(p=>({...p,sessions:p.sessions.map(x=>x.id===id?{...x,status:"rejected"}:x)}));
    addNotif({to:s.studentId,type:"error",title:L==="ar"?"تعذر تأكيد الموعد":"Session Rejected",body:L==="ar"?"اختر وقتاً آخر":"Please choose another time"});
  };
  const complete=id=>setDb(p=>({...p,sessions:p.sessions.map(x=>x.id===id?{...x,status:"completed"}:x)}));
  const updateProg=(sid,d)=>setDb(p=>({...p,users:p.users.map(u=>u.id===sid?{...u,progress:Math.min(100,Math.max(0,(u.progress||0)+d))}:u)}));
  const saveLinks=()=>{setDb(p=>({...p,users:p.users.map(u=>u.id===me.id?{...u,...links}:u)}));addNotif({to:me.id,type:"success",title:L==="ar"?"تم حفظ الروابط":"Links Saved",body:""});setLinkModal(false);};

  if(page==="t-availability") return(
    <div>
      <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:18}}>
        🗓 {L==="ar"?"جدول أوقاتي المتاحة":"My Availability Schedule"}
      </h2>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:20,marginBottom:16}}>
        <div style={{color:T.textD,fontSize:13,marginBottom:16}}>{L==="ar"?"حدد الأيام والأوقات التي تكون فيها متاحاً للتدريس. سيتمكن الطلاب من الحجز في هذه الأوقات فقط.":"Select the days and hours when you are available to teach. Students can only book during these times."}</div>
        <AvailabilityManager teacher={me} L={L} onSave={avail=>{setDb(p=>({...p,users:p.users.map(u=>u.id===me.id?{...u,availability:avail}:u)}));addNotif({to:me.id,type:"success",title:L==="ar"?"تم حفظ جدولك":"Schedule Saved",body:L==="ar"?"تم تحديث أوقاتك المتاحة":"Your available times have been updated"});}}/>
      </div>
    </div>
  );

  if(page==="t-profile") return(
    <div>
      <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:18}}>
        👤 {L==="ar"?"ملفي الشخصي":"My Profile"}
      </h2>
      <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:24,alignItems:"start"}}>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:24,textAlign:"center"}}>
          <AvatarUploader current={me.avatar} size={100} L={L} onUpload={b64=>{setDb(p=>({...p,users:p.users.map(u=>u.id===me.id?{...u,avatar:b64}:u)}));addNotif({to:me.id,type:"success",title:L==="ar"?"تم تحديث الصورة":"Photo Updated",body:""});}}/>
          <div style={{color:T.text,fontWeight:800,fontSize:16,marginTop:12}}>{getName(me,L)}</div>
          <div style={{color:T.gold,fontSize:13}}>{L==="en"&&me.specialtyEn?me.specialtyEn:me.specialty}</div>
          <div style={{color:T.muted,fontSize:11,marginTop:4}}>{"★".repeat(Math.round(me.rating||5))} {me.rating}</div>
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:24}}>
          <div style={{color:T.gold,fontWeight:800,fontSize:14,marginBottom:14}}>📋 {L==="ar"?"البيانات الشخصية":"Personal Info"}</div>
          {[
            [L==="ar"?"الاسم":"Name", me.name],
            [L==="ar"?"البريد الإلكتروني":"Email", me.email],
            [L==="ar"?"الهاتف":"Phone", `${me.dialCode||""} ${me.phone||""}`],
            [L==="ar"?"الدولة":"Country", COUNTRIES.find(c=>c.code===me.country)?.flag+" "+(L==="ar"?COUNTRIES.find(c=>c.code===me.country)?.ar:COUNTRIES.find(c=>c.code===me.country)?.en)||"—"],
            [L==="ar"?"التخصص":"Specialty", L==="en"&&me.specialtyEn?me.specialtyEn:me.specialty],
            [L==="ar"?"تاريخ الانضمام":"Join Date", me.joinDate],
          ].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{color:T.muted,fontSize:13}}>{k}</span>
              <span style={{color:T.text,fontSize:13,fontWeight:600}}>{v||"—"}</span>
            </div>
          ))}
          <div style={{marginTop:16,background:T.bg,borderRadius:10,padding:14}}>
            <div style={{color:T.muted,fontSize:11,marginBottom:4}}>🔗 {L==="ar"?"روابطي":"Meeting Links"}</div>
            {[["Zoom",me.zoomLink],["Google Meet",me.meetLink],[L==="ar"?"رابط مخصص":"Custom",me.customLink]].map(([l,v])=>v&&(
              <div key={l} style={{color:T.gold,fontSize:11,marginBottom:3}}>• {l}: <span style={{fontFamily:"monospace"}}>{v}</span></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  if(page==="t-homework")   return <HomeworkPage currentUser={me} db={db} setDb={setDb} addNotif={addNotif} L={L}/>;
  if(page==="t-logs")       return <SessionLogPage currentUser={me} db={db} setDb={setDb} addNotif={addNotif} L={L}/>;
  if(page==="t-resources")  return <ResourcesPage currentUser={me} db={db} setDb={setDb} addNotif={addNotif} L={L}/>;
  if(page==="t-exams")      return <ExamPage currentUser={me} db={db} setDb={setDb} addNotif={addNotif} L={L}/>;
  if(page==="t-chat")       return <ChatPage currentUser={me} db={db} setDb={setDb} L={L}/>;
  if(page==="t-sessions") return(
    <div>
      {meetModal&&<MeetingRoom session={meetModal} student={db.users.find(u=>u.id===meetModal.studentId)} teacher={me} currentUser={me} onClose={()=>setMeetModal(null)} L={L}/>}
      <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:18}}>📅 {t(L,"sessions")}</h2>
      {["awaiting","confirmed","completed","rejected"].map(st=>{
        const list=mySessions.filter(s=>s.status===st);
        if(!list.length) return null;
        return <div key={st}>
          <div style={{color:T.textD,fontSize:13,fontWeight:700,margin:"14px 0 8px"}}>{st==="awaiting"?"⏳":st==="confirmed"?"✅":st==="completed"?"📗":"❌"} {t(L,st==="awaiting"?"awaiting":st==="confirmed"?"confirmed":st==="completed"?"completed":"rejected2")} ({list.length})</div>
          {list.map(s=>{
            const stud=db.users.find(u=>u.id===s.studentId);
            return <Card key={s.id} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <Av n={getName(stud,L)} s={38}/>
                  <div>
                    <div style={{color:T.text,fontWeight:800,fontSize:14}}>{getName(stud,L)}</div>
                    <div style={{color:T.muted,fontSize:12}}>{t(L,s.type)} · {s.day} · {s.time} · {s.duration}{t(L,"minutes")}</div>
                    {s.notes&&<div style={{color:T.textD,fontSize:11}}>📝 {s.notes}</div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  {st==="awaiting"&&<><GBtn sm onClick={()=>approve(s.id)}>✅ {t(L,"approve")}</GBtn><GBtn ghost sm danger onClick={()=>reject(s.id)}>{t(L,"reject")}</GBtn></>}
                  {st==="confirmed"&&<><GBtn sm onClick={()=>setMeetModal(s)}>🎙 {t(L,"startSession")}</GBtn><GBtn ghost sm onClick={()=>complete(s.id)}>✓</GBtn></>}
                </div>
              </div>
            </Card>;
          })}
        </div>;
      })}
    </div>
  );
  if(page==="t-students") return(
    <div>
      <h2 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:18}}>👨‍🎓 {t(L,"myStudents")} ({myStudents.length})</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
        {myStudents.map((s,i)=>{
          const ctry=COUNTRIES.find(c=>c.code===s.country);
          return <Card key={s.id} style={{animationDelay:`${i*70}ms`}} className="fu">
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <UserAvatar user={s} s={48}/>
              <div>
                <div style={{color:T.text,fontWeight:800,fontSize:14}}>{getName(s,L)}</div>
                <div style={{color:T.muted,fontSize:11}}>{L==="ar"?"العمر":"Age"}: {s.age} {ctry&&`· ${ctry.flag} ${L==="ar"?ctry.ar:ctry.en}`}</div>
                <Bdg c={s.level==="advanced"?"green":s.level==="intermediate"?"gold":"blue"} sm>{t(L,s.level||"beginner")}</Bdg>
              </div>
            </div>
            <Sep/>
            <div style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{color:T.muted,fontSize:12}}>{t(L,"progress")}</span>
                <span style={{color:T.gold,fontWeight:800}}>{s.progress||0}%</span>
              </div>
              <div style={{background:T.bg,borderRadius:6,height:7,overflow:"hidden"}}>
                <div style={{width:`${s.progress||0}%`,height:"100%",background:`linear-gradient(90deg,${T.goldD},${T.gold})`,borderRadius:6}}/>
              </div>
              <div style={{color:T.textD,fontSize:11,marginTop:4}}>{s.memorized}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <GBtn ghost sm onClick={()=>updateProg(s.id,5)}>+5%</GBtn>
              <GBtn ghost sm onClick={()=>updateProg(s.id,-5)}>-5%</GBtn>
            </div>
          </Card>;
        })}
        {!myStudents.length&&<div style={{color:T.muted,fontSize:14,textAlign:"center",padding:"40px 0",gridColumn:"1/-1"}}>{L==="ar"?"لا يوجد طلاب بعد":"No students yet"}</div>}
      </div>
    </div>
  );

  return(
    <div>
      {meetModal&&<MeetingRoom session={meetModal} student={db.users.find(u=>u.id===meetModal.studentId)} teacher={me} currentUser={me} onClose={()=>setMeetModal(null)} L={L}/>}
      {linkModal&&<Modal title={`🔗 ${L==="ar"?"روابط الاجتماع":"Meeting Links"}`} onClose={()=>setLinkModal(false)}>
        <Inp label="🎥 Zoom" value={links.zoomLink} onChange={v=>setLinks(p=>({...p,zoomLink:v}))} ph="https://zoom.us/j/..."/>
        <Inp label="📹 Google Meet" value={links.meetLink} onChange={v=>setLinks(p=>({...p,meetLink:v}))} ph="https://meet.google.com/..."/>
        <Inp label={`🔗 ${t(L,"customLink")}`} value={links.customLink} onChange={v=>setLinks(p=>({...p,customLink:v}))} ph="https://..."/>
        <GBtn full onClick={saveLinks}>{t(L,"save")}</GBtn>
      </Modal>}

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <UserAvatar user={me} s={54} gold/>
        <div style={{flex:1}}>
          <h1 className="sh" style={{fontFamily:"'Amiri',serif",fontSize:24,fontWeight:700,marginBottom:2}}>{L==="ar"?"أهلاً,":"Hello,"} {getName(me,L)}</h1>
          <div style={{color:T.muted,fontSize:13}}>{L==="en"&&me.specialtyEn?me.specialtyEn:me.specialty}</div>
        </div>
        <GBtn ghost sm onClick={()=>setLinkModal(true)}>🔗 {L==="ar"?"روابطي":"My Links"}</GBtn>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:16}}>
        {[
          {icon:"👨‍🎓",l:t(L,"myStudents"),v:myStudents.length,c:T.gold},
          {icon:"⏳",l:t(L,"awaiting"),v:pending.length,c:pending.length?T.redL:T.muted},
          {icon:"📅",l:t(L,"confirmed"),v:upcoming.length,c:T.greenL},
          {icon:"✅",l:t(L,"completed"),v:mySessions.filter(s=>s.status==="completed").length,c:T.blueL},
        ].map(s=>(
          <Card key={s.l} style={{textAlign:"center",padding:14}}>
            <div style={{fontSize:22,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:26,fontWeight:900,color:s.c,lineHeight:1,marginBottom:3}}>{s.v}</div>
            <div style={{color:T.muted,fontSize:10}}>{s.l}</div>
          </Card>
        ))}
      </div>

      {pending.length>0&&<Card style={{marginBottom:14,border:`1px solid ${T.red}33`,background:`linear-gradient(135deg,${T.card},${T.redBg})`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>

// ═══════════════════════════════════════════════════════════════════════════
//  TEACHER AVAILABILITY MANAGER
// ═══════════════════════════════════════════════════════════════════════════
const ALL_HOURS = ["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00"];
const WEEK_DAYS_EN = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const WEEK_DAYS_AR = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

function AvailabilityManager({teacher, onSave, L}){
  const [avail, setAvail] = useState(teacher.availability || {});
  const [saved, setSaved] = useState(false);

  const days = L==="ar" ? WEEK_DAYS_AR : WEEK_DAYS_EN;
  const daysEn = WEEK_DAYS_EN;

  const toggle = (dayEn, hour) => {
    setAvail(prev => {
      const curr = prev[dayEn] || [];
      const next = curr.includes(hour) ? curr.filter(h=>h!==hour) : [...curr, hour].sort();
      return {...prev, [dayEn]: next};
    });
    setSaved(false);
  };

  const clearDay = dayEn => { setAvail(prev=>({...prev,[dayEn]:[]})); setSaved(false); };
  const fillDay  = dayEn => { setAvail(prev=>({...prev,[dayEn]:[...ALL_HOURS]})); setSaved(false); };

  const save = () => { onSave(avail); setSaved(true); setTimeout(()=>setSaved(false),2500); };

  const totalSlots = Object.values(avail).reduce((a,v)=>a+(v?.length||0),0);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h3 style={{color:T.text,fontSize:15,fontWeight:800,marginBottom:3}}>
            {L==="ar"?"🗓 جدول الأوقات المتاحة":"🗓 Availability Schedule"}
          </h3>
          <div style={{color:T.muted,fontSize:12}}>
            {L==="ar"?`${totalSlots} وقت متاح إجمالاً`:`${totalSlots} available slots total`}
          </div>
        </div>
        <button onClick={save} style={{background:saved?"#0f6b30":GG,color:saved?"#fff":"#04060d",border:"none",borderRadius:10,padding:"9px 20px",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit",transition:"all .3s",boxShadow:`0 4px 16px ${T.gold}44`}}>
          {saved?(L==="ar"?"✅ تم الحفظ":"✅ Saved!"):(L==="ar"?"💾 حفظ الجدول":"💾 Save Schedule")}
        </button>
      </div>

      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:600}}>
          {/* Header row */}
          <div style={{display:"grid",gridTemplateColumns:"100px repeat(7,1fr)",gap:4,marginBottom:6}}>
            <div style={{color:T.muted,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>{L==="ar"?"الوقت":"Time"}</div>
            {daysEn.map((dayEn,i)=>{
              const dayLabel = L==="ar" ? WEEK_DAYS_AR[i] : dayEn;
              const slotCount = (avail[dayEn]||[]).length;
              return(
                <div key={dayEn} style={{textAlign:"center"}}>
                  <div style={{color:T.text,fontSize:11,fontWeight:700,marginBottom:3}}>{dayLabel}</div>
                  <div style={{display:"flex",gap:3,justifyContent:"center"}}>
                    <button onClick={()=>fillDay(dayEn)} style={{background:`${T.green}22`,border:`1px solid ${T.green}44`,color:T.greenL,borderRadius:5,padding:"2px 5px",cursor:"pointer",fontSize:9,fontFamily:"inherit"}}>
                      {L==="ar"?"كل":"All"}
                    </button>
                    <button onClick={()=>clearDay(dayEn)} style={{background:`${T.red}22`,border:`1px solid ${T.red}44`,color:T.redL,borderRadius:5,padding:"2px 5px",cursor:"pointer",fontSize:9,fontFamily:"inherit"}}>
                      {L==="ar"?"مسح":"Clr"}
                    </button>
                  </div>
                  {slotCount>0&&<div style={{color:T.gold,fontSize:9,marginTop:2}}>{slotCount} {L==="ar"?"وقت":"slots"}</div>}
                </div>
              );
            })}
          </div>

          {/* Time rows */}
          {ALL_HOURS.map(hour=>(
            <div key={hour} style={{display:"grid",gridTemplateColumns:"100px repeat(7,1fr)",gap:4,marginBottom:3}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,fontSize:11,fontWeight:600,background:T.bg,borderRadius:6,padding:"6px 4px"}}>{hour}</div>
              {daysEn.map(dayEn=>{
                const active = (avail[dayEn]||[]).includes(hour);
                return(
                  <button key={dayEn} onClick={()=>toggle(dayEn,hour)} style={{
                    background: active?`linear-gradient(135deg,${T.greenBg},#0f3320)`:T.bg,
                    border: `1px solid ${active?T.greenL+"55":T.border}`,
                    borderRadius:6, padding:"8px 4px", cursor:"pointer",
                    transition:"all .18s",
                    boxShadow: active?`0 0 8px ${T.green}33`:"none",
                  }}>
                    {active && <div style={{width:8,height:8,borderRadius:"50%",background:T.greenL,margin:"0 auto",boxShadow:`0 0 6px ${T.greenL}`}}/>}
                    {!active && <div style={{width:8,height:8,borderRadius:"50%",background:T.border,margin:"0 auto"}}/>}
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:12,background:T.bg,borderRadius:10,padding:"10px 14px",border:`1px solid ${T.border}`}}>
        <div style={{color:T.muted,fontSize:11,marginBottom:6}}>{L==="ar"?"الأوقات المتاحة بالتفصيل:":"Available slots summary:"}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {daysEn.map((dayEn,i)=>{
            const slots=avail[dayEn]||[];
            if(!slots.length) return null;
            const dayLabel=L==="ar"?WEEK_DAYS_AR[i]:dayEn;
            return(
              <div key={dayEn} style={{background:T.card,borderRadius:8,padding:"6px 10px",border:`1px solid ${T.green}33`}}>
                <div style={{color:T.greenL,fontSize:11,fontWeight:700,marginBottom:3}}>{dayLabel}</div>
                <div style={{color:T.muted,fontSize:10}}>{slots.join(" · ")}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  GET AVAILABLE SLOTS (used when student books — filters out booked times)
// ═══════════════════════════════════════════════════════════════════════════
function getAvailableSlots(teacher, sessions, targetDay) {
  // targetDay is English day name e.g. "Monday"
  const allSlots = (teacher.availability || {})[targetDay] || [];
  // Find already-booked confirmed/awaiting sessions for this teacher on this day
  const bookedTimes = sessions
    .filter(s => s.teacherId === teacher.id && s.day === targetDay && (s.status==="confirmed"||s.status==="awaiting"))
    .map(s => s.time);
  return allSlots.filter(slot => !bookedTimes.includes(slot));
}

// ═══════════════════════════════════════════════════════════════════════════
//  AVATAR UPLOADER — teacher or student photo
// ═══════════════════════════════════════════════════════════════════════════
function AvatarUploader({current, onUpload, size=80, L}){
  const ref = useRef();
  const [preview, setPreview] = useState(current||"");

  const handleFile = e => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024){ alert(L==="ar"?"الصورة كبيرة جداً، الحد الأقصى 2MB":"Image too large, max 2MB"); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const b64 = ev.target.result;
      setPreview(b64);
      onUpload(b64);
    };
    reader.readAsDataURL(file);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <div style={{position:"relative",width:size,height:size}}>
        {preview
          ? <img src={preview} alt="avatar" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:`3px solid ${T.gold}`,boxShadow:`0 0 20px ${T.gold}44`}}/>
          : <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,#0a3a18,#22c55e22)`,border:`3px solid ${T.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38,color:T.textD}}>📷</div>
        }
        <button onClick={()=>ref.current?.click()} style={{position:"absolute",bottom:0,right:0,width:28,height:28,borderRadius:"50%",background:GG,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,boxShadow:`0 2px 8px ${T.gold}66`}}>✏️</button>
      </div>
      <input ref={ref} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
      <div style={{color:T.muted,fontSize:11,textAlign:"center"}}>{L==="ar"?"اضغط لتغيير الصورة · الحد الأقصى 2MB":"Tap to change · Max 2MB"}</div>
    </div>
  );
}

const convertTime=(time,fromTZ,toTZ)=>{
  try{
    const [h,m]=time.split(":").map(Number);
    const d=new Date(); d.setHours(h,m,0,0);
    const fromStr=d.toLocaleTimeString("en-US",{timeZone:fromTZ,hour:"2-digit",minute:"2-digit",hour12:false});
    const toStr=d.toLocaleTimeString("en-US",{timeZone:toTZ,hour:"2-digit",minute:"2-digit",hour12:false});
    return toStr;
  }catch{return time;}
};
